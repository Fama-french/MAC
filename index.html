<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Lost in Space   MAC Odyssey</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060912;color:#E8F0FF;overflow:hidden;height:100vh;width:100vw;font-family:'Inter',sans-serif}
.f-orb{font-family:'Orbitron',sans-serif}
.f-mono{font-family:'Space Mono',monospace}

@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.9}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes floatY2{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideInR{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulseBright{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes lockIn{0%{transform:scale(1)rotate(0)}60%{transform:scale(1.5)rotate(15deg)}100%{transform:scale(1)rotate(0)}}
@keyframes redFlash{0%,100%{background:transparent}50%{background:rgba(255,77,77,.2)}}
@keyframes greenPop{0%{background:transparent}50%{background:rgba(0,255,136,.18)}100%{background:transparent}}
@keyframes terrainDrift{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes starDrift{0%{transform:translateX(0)}100%{transform:translateX(-33.33%)}}
@keyframes lightning{0%,89%,100%{opacity:0}90%,96%{opacity:1}93%,99%{opacity:.4}}
@keyframes coinFloat{0%{transform:translateY(0) rotate(0)}50%{transform:translateY(-20px) rotate(180deg)}100%{transform:translateY(0) rotate(360deg)}}
@keyframes dataLine{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
@keyframes crtScan{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes barGrow{from{height:0}to{height:var(--h)}}
@keyframes lineGrow{from{stroke-dashoffset:800}to{stroke-dashoffset:0}}
@keyframes travelShip{0%{left:-8%}100%{left:110%}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}

.char-float{animation:floatY 3.5s ease-in-out infinite}
.char-float2{animation:floatY2 4s ease-in-out infinite .6s}
.anim-fade{animation:fadeIn .5s ease forwards}
.anim-up{animation:slideUp .4s ease forwards}
.anim-inR{animation:slideInR .45s cubic-bezier(.22,1,.36,1) forwards}
.pulse{animation:pulseBright 1.8s ease-in-out infinite}

/* CINEMATIC DIALOGUE BAR */
.cinema-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:22vh;min-height:140px;
  background:linear-gradient(to bottom,rgba(4,7,18,.0) 0%,rgba(4,7,18,.97) 12%);
  z-index:40;cursor:pointer;
  border-top:1px solid rgba(255,255,255,.06);
}
.cinema-inner{
  height:100%;padding:12px 24px 14px;
  display:flex;flex-direction:column;justify-content:flex-end;gap:6px;
  max-width:1100px;margin:0 auto;
}

/* STAR MAP */
.starmap-node{cursor:pointer;transition:all .3s}
.starmap-node:hover{filter:brightness(1.4)}

/* DASHBOARD CRT */
.crt-overlay{
  position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.035) 2px,rgba(0,0,0,.035) 4px);
}
.crt-scan{
  position:fixed;inset:0;pointer-events:none;z-index:998;overflow:hidden;
}
.crt-scan::after{
  content:'';position:absolute;left:0;right:0;height:80px;
  background:linear-gradient(transparent,rgba(0,255,136,.04),transparent);
  animation:crtScan 6s linear infinite;
}
.monitor-panel{
  background:rgba(0,20,10,.7);border:1px solid rgba(0,255,136,.25);
  border-radius:8px;padding:16px;
  box-shadow:0 0 20px rgba(0,255,136,.08),inset 0 0 30px rgba(0,0,0,.5);
}
.grid-bg{
  background-image:linear-gradient(rgba(0,255,136,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.05) 1px,transparent 1px);
  background-size:40px 40px;
}
</style>
</head>
<body>
<div id="root"></div>

const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ═══════════════════════════════════════

const CHARS={
  SEBASTIAN:{name:'SEBASTIAN',role:'The Oracle',color:'#FFD700'},
  ALPHA:    {name:'RAMI',     role:'Astronaut',color:'#00D4FF'},
  BETA:     {name:'LÉOPOLD', role:'Astronaut',color:'#7B2FFF'},
  ORGA:     {name:'YUDHISTIRA',role:'Orga Alien Guide',     color:'#00FF88'},
  COSTUS:   {name:'SHREYA',    role:'Costus Alien Guide',   color:'#FF8C00'},
  BUDGETRON:{name:'LUTHFI',    role:'Budgetron Alien Guide',color:'#00BFFF'},
  RISKAR:   {name:'SILET',     role:'Riskar Alien Guide',   color:'#FF4D4D'},
};

const CHAPTERS=[
  {id:0,key:'intro',title:'THE INCIDENT',sub:'Year 2031   Deep Space',bg:'intro',
   dialogues:[
    {char:'SEBASTIAN',text:"Welcome, class. Year 2031. The global space economy has reached $640 billion. Two astronauts aboard capsule EXOTRAIL-7 are heading home... until something goes wrong."},
    {char:'ALPHA',text:"Alpha to mission control   we have a problem. Propulsion system failure. The thruster module made by Exotrail is offline.",special:'alarm'},
    {char:'BETA',text:"Main engine: dead. Emergency backup: 10% charge. Not enough to reach Earth. Not even close."},
    {char:'SEBASTIAN',text:"Exotrail is a French deep-tech startup building electric Hall-effect thrusters for nanosatellites. Fast-growing. Innovative. But with serious MAC blind spots that have now put our crew at risk.",special:'dataPanel'},
    {char:'BETA',text:"We interviewed the Chief Fluid System Engineer at Exotrail. His words were clear, per the interview conducted with the Exotrail employee: 'Cost performance was never monitored. Schedule performance was monitored by the level of unsatisfaction expressed by customers in meetings.'"},
    {char:'ALPHA',text:"In other words: no Management Accounting and Control system. No cost control. Just reacting to whoever complained the loudest that month."},
    {char:'ALPHA',text:"But the backup is enough for short hops. Each planet we visit, each Management Accounting and Control system we repair, restores power to the main engine. Knowledge is the only fuel we have left."},
    {char:'BETA',text:"Four repairs. Four power boosts. Then we go home. Starting power reserve: 10%. First stop: Planeta Orga."},
    {char:'SEBASTIAN',text:"The space sector is brutal. Ariane 6 was 4 years late and massively over budget. COVID. Technical failures at Kourou. Thin planning margins. Sound familiar?"},
    {char:'ALPHA',text:"Backup thruster firing. Short hop. Planeta Orga is close. We can make it."},
   ],
   dataPanel:{title:'📊 EXOTRAIL   QUICK FACTS',items:[
    {l:'Sector',v:'New Space / Electric Propulsion'},
    {l:'Product',v:'Hall-effect thrusters for nanosatellites'},
    {l:'Funding',v:'Fundraising + milestone contracts'},
    {l:'⚠️ Problems',v:'No costing · No risk mgmt · Matrix org confusion'},
   ]},
   theoryBox:null,repair:null,planet:null,
  },
  {id:1,key:'orga',title:'PLANETA ORGA',sub:'System 1   Organizational Control',bg:'orga',
   planet:{name:'PLANETA ORGA',color:'#00FF88',emoji:'🌿'},
   dialogues:[
    {char:'ALPHA',text:"Planeta Orga. Our organizational systems are failing. The capsule is burning fuel because nobody knows who is responsible for what.",special:'landing'},
    {char:'ORGA',text:"Greetings. I am Orga. Your propulsion team suffers from what we call matrix confusion."},
    {char:'BETA',text:"Explain?"},
    {char:'ORGA',text:"Exotrail runs a functional structure overlaid with a matrix organization. Divisional and functional managers both claim ownership of the same tasks. But it goes deeper than that. Per the interview conducted with the Exotrail employee: 'Specifications were unknown by engineering teams due to a breakdown in information sharing. Technical information was not communicated to dedicated teams in an optimal way.'",special:'theoryBox'},
    {char:'ALPHA',text:"We saw this at ArianeGroup. An employee from Ariane told us: with 15 to 20 contributing nations on Ariane 6, information got lost traveling up the hierarchy."},
    {char:'ALPHA',text:"Daanish described it precisely, per the interview conducted with the Exotrail employee: 'Planning was done in a very unclear way. No clarity was provided to the engineering team. The horizon given to engineers was 3 to 4 weeks. That is not planning, that is firefighting.'"},
    {char:'BETA',text:"And when Daanish actually produced a 2-year planning document for his fluid systems team, with clear activities and a one-month contingency buffer, management rejected it. Not because of the content. Because of the formatting. He stopped writing internal documents after that."},
    {char:'ORGA',text:"This is the cost of organizational chaos. Processes defined by top management who are not close enough to the technical reality. Engineers disconnected from the decisions that affect their own work. Per the interview conducted with the Exotrail employee: 'The few existing processes were defined by top management, not by department managers who actually understood the challenges.'"},
    {char:'ORGA',text:"The solution is a RACI matrix. Assign one clear owner per activity. Remove duplicate accountabilities. Simplify. Companies like MaiaSpace and Latitude prove you can move fast with clear lines."},
    {char:'BETA',text:"Responsibility is not overhead. It is control."},
    {char:'ORGA',text:"Exactly. Now repair your first system.",special:'repair'},
    {char:'BETA',text:"Organizational redundancies eliminated. Freed-up energy routing back to main engine..."},
    {char:'SEBASTIAN',text:"System 1 restored. Power reserve: 32%. The capsule is no longer wasting energy on duplicated work. Three systems remain."},
    {char:'ALPHA',text:"32%, enough for the next hop. Costus is further out. If we don't fix the costing problem there, we burn resources we don't even know we have."},
   ],
   dataPanel:{title:'📋 RACI MATRIX',items:[
    {l:'R   Responsible',v:'Does the work (project team)'},
    {l:'A   Accountable',v:'Owns outcome   ONE person only'},
    {l:'C   Consulted',v:'Provides expertise'},
    {l:'I   Informed',v:'Kept in the loop'},
    {l:'⚠️ Gap',v:'Multiple A-owners → no accountability'},
   ]},
   theoryBox:{title:'📚 MAC THEORY   ORGANIZATIONAL CONTROL',lines:[
    '• Matrix orgs: dual authority   functional vs project manager',
    '• Without RACI: costs duplicated, accountability vanishes',
    '• RACI = Responsible / Accountable / Consulted / Informed',
    '• Source: Merchant & Van der Stede, Management Control Systems',
    '• ArianeGroup: 15-20 nations, hierarchical info loss',
   ]},
   repair:{emoji:'⚙️',sys:'SYSTEM 1   ORG MATRIX',color:'#00FF88'},
  },
  {id:2,key:'costus',title:'PLANETA COSTUS',sub:'System 2   Cost Center Tracking',bg:'costus',
   planet:{name:'PLANETA COSTUS',color:'#FF8C00',emoji:'💰'},
   dialogues:[
    {char:'BETA',text:"Planeta Costus. We're flying blind   we don't know what anything costs.",special:'landing'},
    {char:'COSTUS',text:"Welcome. Your ship burns fuel it cannot price. Exotrail does not know if its selling price covers its real costs. It has never systematically tracked labor hours per project."},
    {char:'ALPHA',text:"How is that possible for a company selling propulsion systems worth hundreds of thousands of euros to satellite manufacturers?"},
    {char:'COSTUS',text:"Startup logic. Gain market share first, account later. But this has a direct cost. Per the interview conducted with the Exotrail employee: 'We had very low visibility of what the propulsion system was sold for. So we did not know how or what we had to cost-control.' Without a costing system, engineers cannot align their work with financial targets, because no one tells them what those targets are.",special:'theoryBox'},
    {char:'BETA',text:"The fix: cost center tracking. Report total labor hours per cost center across all projects. Build variance analysis   compare budgeted vs actual. Use this to price contracts with confidence, not intuition.",special:'dataPanel'},
    {char:'COSTUS',text:"SpaceX does this at scale through vertical integration   they control costs from manufacturing to launch. Exotrail needs its own version, adapted for a 100-person startup."},
    {char:'ALPHA',text:"Daanish pointed out something critical, per the interview conducted with the Exotrail employee: certain internal manufacturing processes were destroying large numbers of components. Engineering tried to fix this to reduce waste and lead times. Management ignored it. That wasted cost was never tracked, because there was no costing system to catch it."},
    {char:'COSTUS',text:"Cost-efficiency was simply not a priority. The top priority was securing customer contracts for long-term market presence. A legitimate startup strategy, but one that made Exotrail structurally cost-inefficient. You cannot manage what you do not measure."},
    {char:'ALPHA',text:"No costing system means every contract is a gamble. Installing the system now.",special:'repair'},
    {char:'BETA',text:"Cost tracking online. We now know exactly what we're spending. Energy waste identified and cut."},
    {char:'SEBASTIAN',text:"System 2 restored. Power reserve: 55%. For the first time, this capsule knows its own costs. Budgetron is further, but we have the fuel to reach it."},
    {char:'ALPHA',text:"55% and climbing. Budgetron is deep in the outer system. Longer hop. But we planned for this."},
   ],
   dataPanel:{title:'💰 COST CENTER APPROACH',items:[
    {l:'Cost Center',v:'Unit tracked for costs only (not revenue)'},
    {l:'Labor Hours',v:'Tracked per project & per cost center'},
    {l:'Variance',v:'Actual − Budgeted = Learning signal'},
    {l:'Without system',v:'Selling price = guess, margin = unknown'},
    {l:'🎯 Target',v:'Price contracts on data, not intuition'},
   ]},
   theoryBox:{title:'📚 MAC THEORY   COST CENTER APPROACH',lines:[
    '• Cost center: org unit tracked for costs only',
    '• Labor hour tracking = foundation of accurate costing',
    '• Variance analysis: Actual − Budgeted → explains overruns',
    '• Without this: selling price is a guess, margin unknown',
    '• Exotrail: no historical labor hour database',
   ]},
   repair:{emoji:'💰',sys:'SYSTEM 2   COSTING',color:'#FF8C00'},
  },
  {id:3,key:'budgetron',title:'PLANETA BUDGETRON',sub:'System 3   Rolling Forecasts',bg:'budgetron',
   planet:{name:'PLANETA BUDGETRON',color:'#00BFFF',emoji:'📊'},
   dialogues:[
    {char:'ALPHA',text:"Planeta Budgetron. Our trajectory is wrong. We budgeted for an 11-month mission with 10 crew members. We are now at month 15, with 18 people involved. That is 36% over schedule and 80% over headcount, and nobody officially acknowledged the deviation.",special:'landing'},
    {char:'BUDGETRON',text:"Classic overoptimism. Exotrail's initial budgets underestimate labor hours. No budget revisions mid-project. Delivery is prioritized   finances are secondary."},
    {char:'BETA',text:"But if you don't track budget versus reality, how do you ever improve your estimates?"},
    {char:'BUDGETRON',text:"You don't. That is the problem. Exotrail has two funding sources: fundraising and milestone-based customer contracts. A milestone is a key step in the project, marked by a formal review meeting between the customer and Exotrail. If the customer approves the milestone, Exotrail is authorized to move to the next project phase, and the customer pays the corresponding contractual portion. The entire pressure becomes: pass the milestone. Financial performance is secondary. Budget overruns become invisible until it is too late.",special:'dataPanel'},
    {char:'ALPHA',text:"Ariane 6 illustrates this at macro level. Budget governed every two years via ESA ministerial meetings. Political decisions affected resource allocation. Knowledge transfers caused delays."},
    {char:'BUDGETRON',text:"The solution: rolling forecasts updated every six months, or at every milestone   whichever comes first. Use a WBS to track costs activity by activity. Leave a contingency buffer   ArianeGroup used 10 to 20 percent.",special:'theoryBox'},
    {char:'BETA',text:"Per the interview conducted with the Exotrail employee: 'The production schedule was always directed toward whichever customer was most unsatisfied that month. One month, priority for one customer. The next month, the most annoyed customer takes over. No fixed long-term production line.' This is reactive management, not planned management."},
    {char:'ALPHA',text:"Daanish also noted, per the interview conducted with the Exotrail employee: 'If management would listen to engineering, forecasting would be with much greater accuracy. Spending would be predicted better, reducing overall uncertainty in decision-making and project execution.' The information existed. It was just ignored."},
    {char:'BUDGETRON',text:"Compare this with Orelia in Finland, a company that produces one gas turbine per year. Every day, a production meeting. A very small, very clear set of defined tasks. No rushing. No reactive reprioritization. Predictable output. Predictable cost. That level of discipline is what rolling forecasts, built with engineering teams, can deliver."},
    {char:'ALPHA',text:"Installing rolling forecast system now.",special:'repair'},
    {char:'BETA',text:"Forecasting system active. Engine burn calculations are now accurate. No more guessing the trajectory."},
    {char:'SEBASTIAN',text:"System 3 restored. Power reserve: 80%. One repair remaining. Planeta Riskar, the furthest point. And then, Earth."},
    {char:'ALPHA',text:"80%. We've never had this much power since the incident. But Riskar is the furthest planet on our route. It holds the most dangerous knowledge: risk management. The one thing Exotrail never built."},
    {char:'BETA',text:"If we can fix this last system, the main engine comes back online. Full thrust. Direct course for Earth. Let's go."},
   ],
   dataPanel:{title:'📊 ARIANE 6   BUDGET REALITY',items:[
    {l:'Launch planned',v:'2020'},
    {l:'Actual launch',v:'2024 → 4-year delay'},
    {l:'Contributors',v:'15-20 European nations via ESA'},
    {l:'Budget cadence',v:'Every 2 years (ministerial)'},
    {l:'Root causes',v:'New tech uncertainty · COVID · Kourou issues'},
   ]},
   theoryBox:{title:'📚 MAC THEORY   ROLLING FORECASTS & WBS',lines:[
    '• Rolling Forecast: continuously updated projection',
    '• Update frequency ≥ half duration of current project phase',
    '• WBS: breaks project into trackable costed activities',
    '• Contingency buffer: 10-20% recommended',
    '• Ariane 6: annual budgets, biennial ESA governance → overruns',
   ]},
   repair:{emoji:'📅',sys:'SYSTEM 3   BUDGETING',color:'#00BFFF'},
  },
  {id:4,key:'riskar',title:'PLANETA RISKAR',sub:'System 4   Risk Management',bg:'riskar',
   planet:{name:'PLANETA RISKAR',color:'#FF4D4D',emoji:'⚡'},
   dialogues:[
    {char:'BETA',text:"Planeta Riskar. The most dangerous planet. We had zero contingency for this propulsion failure. We assumed nothing would go wrong.",special:'landing'},
    {char:'RISKAR',text:"The deadliest assumption in the space sector. Exotrail has no formal risk management process. But worse, there was an active culture of ignoring risk signals. Per the interview conducted with the Exotrail employee: 'There was a cultural push to ignore information that would not support a larger sales campaign, about the readiness of a given product or technology. Management used to ignore information or suppress test failures.'"},
    {char:'ALPHA',text:"How do you track risk on something technically this complex?"},
    {char:'RISKAR',text:"The Technology Readiness Level scale. TRL 1 through 9. TRL 1 means the concept exists on paper. TRL 9 means proven in operational space conditions. Low TRL components need more budget, more time, more contingency.",special:'dataPanel'},
    {char:'BETA',text:"Exotrail launched projects with components at TRL 4 and 5, budgeted as if they were TRL 8. Overruns were mathematically guaranteed.",special:'theoryBox'},
    {char:'ALPHA',text:"The consequences were concrete. Per the interview conducted with the Exotrail employee: 'The device manufactured for customers was underperforming or not performing at all. Exotrail was selling a technology not mastered by the company. Some critical parts were not well developed due to the rush to deliver. Supply chain problems followed as a direct consequence.'"},
    {char:'RISKAR',text:"There is even a name for this pattern. Richard Feynman, investigating the Challenger disaster in 1986, wrote: 'For a successful technology, reality must take precedence over public relations, for nature cannot be fooled.' Daanish quoted this exact line in his interview. Fifty years later, the same failure mode: organizational pressure suppressing technical truth."},
    {char:'BETA',text:"And per the interview conducted with the Exotrail employee: 'The organization planned an upgrade of the manufacturing chain, while the product was not mature enough for chain manufacturing. Mass production was planned for a non-mature, non-working product.' The risk was visible to engineers. It was invisible to management, by choice."},
    {char:'RISKAR',text:"The solution: build a risk register. Monitor Technology Readiness Level at every milestone. And critically, create a culture where engineers can escalate risk signals without being sidelined. Daanish raised design errors on a NASA Jet Propulsion Laboratory project in late 2023. He was removed from the project. The customer started asking serious questions nine months later."},
    {char:'RISKAR',text:"Ariane 6 repeated the same pattern. Thirty years of Ariane 5   mastered. Then Ariane 6 introduced technologies they had never produced. Some abandoned mid-development. Wasted cost. Wasted time."},
    {char:'ALPHA',text:"Build a risk register. Assign TRL scores at project start. Allocate budget reserves to low-TRL components. Review at every milestone. Make the invisible visible.",special:'repair'},
    {char:'BETA',text:"Risk management system online. Technology Readiness Level monitoring active. All four Management Accounting and Control systems restored. Routing to main engine..."},
    {char:'ALPHA',text:"Main engine... ignition."},
    {char:'SEBASTIAN',text:"Full power. All systems restored. The knowledge was always the fuel. Setting course for Earth."},
   ],
   dataPanel:{title:'🔬 TRL SCALE (NASA/ESA)',items:[
    {l:'TRL 1',v:'Basic principles observed (paper concept)'},
    {l:'TRL 3',v:'Proof of concept demonstrated'},
    {l:'TRL 5',v:'Technology validated in relevant environment'},
    {l:'TRL 7',v:'System prototype in space environment'},
    {l:'TRL 9',v:'Proven in actual mission operations'},
    {l:'⚠️ Exotrail',v:'New thrusters TRL 4-5, budgeted as TRL 8'},
   ]},
   theoryBox:{title:'📚 MAC THEORY   RISK MANAGEMENT',lines:[
    '• Risk register: identify → assess probability × impact → budget',
    '• TRL monitoring = forward-looking risk indicator',
    '• Without risk management: every delay is a "surprise"',
    '• With it: delays are anticipated and recoverable',
    '• Industrialization = highest risk moment in space projects',
   ]},
   repair:{emoji:'🛡️',sys:'SYSTEM 4   RISK MGMT',color:'#FF4D4D'},
  },
  {id:5,key:'earth',title:'RETURN TO EARTH',sub:'Mission Almost Complete',bg:'earth',
   planet:null,
   dialogues:[
    {char:'SEBASTIAN',text:"All four systems repaired. The capsule is flying. But before we land   what did we learn?"},
    {char:'ALPHA',text:"The space sector is not just an engineering challenge. It is a management accounting challenge. Exotrail, ArianeGroup, SpaceX   they all face the same question: how do you deliver complex innovation on time, within budget, under extreme uncertainty?"},
    {char:'BETA',text:"The answer is not guessing harder. It is building systems. Cost centers. RACI matrices. Rolling forecasts. Risk registers. TRL monitoring. These are not bureaucratic overhead   they are survival infrastructure."},
    {char:'ALPHA',text:"Per the interview conducted with the Exotrail employee: 'Have a realistic understanding of what you are making right now, what you are able to deliver right now, what you are able to improve right now. Because this will fundamentally allow you to make commitments that you are actually able to keep.'"},
    {char:'SEBASTIAN',text:"That is not just a management principle. It is the foundation of every Management Accounting and Control system we have repaired today. Honest information. Clear responsibilities. Measured costs. Anticipated risks. These are not tools for large corporations. Per the interview conducted with the Exotrail employee, all mechanisms suggested for Exotrail should be applicable to any space startup at an earlier stage."},
    {char:'SEBASTIAN',text:"Our four recommendations for Exotrail. One: implement a RACI matrix. Two: build a cost center costing system. Three: introduce rolling forecasts updated at every milestone. Four: deploy formal risk management anchored on TRL monitoring."},
    {char:'ALPHA',text:"The space economy will reach one trillion dollars by 2040. The companies that survive will not just be the best engineers. They will be the best managed."},
    {char:'SEBASTIAN',text:"Welcome back to Earth. And welcome to the future of management accounting in the space sector."},
   ],
   dataPanel:null,theoryBox:null,repair:null,
  },
  {id:6,key:'dashboard',title:'MISSION CONTROL',sub:'MAC Performance Dashboard',bg:'dashboard',
   planet:null,dialogues:[],dataPanel:null,theoryBox:null,repair:null,
  },

const STARS_DATA=useMemo?Array.from({length:180},(_, i)=>({
  id:i,x:Math.random()*100,y:Math.random()*100,
  sz:Math.random()*2+.4,dur:(Math.random()*3+2).toFixed(1),delay:(Math.random()*5).toFixed(1)
})):[]; // computed once outside component below

/* ═══════════════════════════════════════
   STARFIELD
═══════════════════════════════════════ */
const STAR_LIST=Array.from({length:180},(_, i)=>({
  id:i,x:Math.random()*100,y:Math.random()*100,
  sz:Math.random()*2+.4,dur:(Math.random()*3+2).toFixed(1),delay:(Math.random()*5).toFixed(1)
}));
function Starfield(){
  return(
    <div style={{position:'fixed',inset:0,zIndex:1,pointerEvents:'none',overflow:'hidden'}}>
      {STAR_LIST.map(s=>(
        <div key={s.id} style={{position:'absolute',left:`${s.x}%`,top:`${s.y}%`,
          width:s.sz,height:s.sz,background:'#E8F0FF',borderRadius:'50%',
          animation:`twinkle ${s.dur}s ease-in-out infinite ${s.delay}s`}}/>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════
   SVG CHARACTER SPRITES
═══════════════════════════════════════ */
function SpriteAlpha({h=200}){
  const w=h*0.55;

function SpacecraftView({repairs}){

  useEffect(()=>{
    repairs.forEach((r,i)=>{ if(r&&!prev.current[i]){ setSparking(i); setTimeout(()=>setSparking(-1),1200); } });
    prev.current=repairs;
  },[repairs]);
  const mods=[{label:'ORG',color:'#00FF88'},{label:'COST',color:'#FF8C00'},{label:'BUDG',color:'#00BFFF'},{label:'RISK',color:'#FF4D4D'}];
  return(
    <div style={{position:'fixed',top:76,left:12,zIndex:45,userSelect:'none'}}>
      <svg width={190} height={130} viewBox="0 0 190 130">
        {/* solar panel L */}
        <rect x="0" y="42" width="55" height="14" rx="4" fill="#112233" stroke="#00D4FF" strokeWidth="1"/>
        {[0,1,2].map(i=><line key={i} x1={10+i*15} y1="42" x2={10+i*15} y2="56" stroke="#00D4FF" strokeWidth=".6" opacity=".5"/>)}
        {/* solar panel R */}
        <rect x="135" y="42" width="55" height="14" rx="4" fill="#112233" stroke="#00D4FF" strokeWidth="1"/>

        {/* body */}
        <rect x="55" y="20" width="80" height="88" rx="10" fill="#0a1628" stroke="#00D4FF" strokeWidth="1.5"/>
        {/* thruster */}
        <rect x="80" y="108" width="30" height="16" rx="4" fill="#112233" stroke="#00D4FF" strokeWidth="1"/>
        {/* thruster flame - all repaired */}
        {repairs.every(Boolean)&&<ellipse cx="95" cy="128" rx="14" ry="8" fill="#00D4FF" opacity=".5"><animate attributeName="opacity" values=".5;1;.5" dur=".8s" repeatCount="indefinite"/></ellipse>}
        {/* panel label */}
        <text x="95" y="36" textAnchor="middle" fill="#00D4FF" fontSize="8" fontFamily="Orbitron" opacity=".6">EXOTRAIL-7</text>
        {/* 4 module nodes */}
        {mods.map((m,i)=>{
          const pos=[[68,22],[112,22],[68,92],[112,92]][i];
          const done=repairs[i];
          const isSpk=sparking===i;
          return(
            <g key={i}>
              <circle cx={pos[0]} cy={pos[1]} r={11} fill={done?m.color+'22':'#1a0000'} stroke={done?m.color:'#FF4D4D'} strokeWidth={done?2:1.5}/>
              <text x={pos[0]} y={pos[1]+4} textAnchor="middle" fontSize="7" fill={done?m.color:'#FF4D4D'} fontFamily="Space Mono">{m.label}</text>
              {done&&<circle cx={pos[0]} cy={pos[1]} r={11} fill="none" stroke={m.color} strokeWidth="1.5" opacity=".6"><animate attributeName="r" values="11;15;11" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values=".6;0;.6" dur="2s" repeatCount="indefinite"/></circle>}
              {isSpk&&[...Array(6)].map((_,si)=>(
                <circle key={si} cx={pos[0]+(Math.cos(si*60*Math.PI/180)*16)} cy={pos[1]+(Math.sin(si*60*Math.PI/180)*16)} r="2" fill="#FFD700" opacity=".9">
                  <animate attributeName="opacity" values=".9;0" dur="0.8s" fill="freeze"/>
                </circle>
              ))}
              {!done&&<text x={pos[0]} y={pos[1]-14} textAnchor="middle" fontSize="8" fill="#FF4D4D">❌</text>}
            </g>
          );
        })}
      </svg>
    </div>
  );
}

/* ═══════════════════════════════════════
   STAR MAP — GALAXY REDESIGN
═══════════════════════════════════════ */
const MAP_NODES={
  start:    {x:55, y:195, name:'',       sub:'',             color:'#00D4FF', r:5,  isStart:true},
  orga:     {x:190,y:105, name:'ORGA',   sub:'Organization', color:'#00FF88', r:19},
  costus:   {x:345,y:285, name:'COSTUS', sub:'Cost Control', color:'#FF8C00', r:19},
  budgetron:{x:505,y:98,  name:'BUDGET', sub:'Forecasting',  color:'#00BFFF', r:19},
  riskar:   {x:658,y:278, name:'RISKAR', sub:'Risk Mgmt',    color:'#FF4D4D', r:19},
  earth:    {x:848,y:178, name:'EARTH',  sub:'DESTINATION',  color:'#4FC3F7', r:34},
};
const MAP_PATH=['start','orga','costus','budgetron','riskar','earth'];

function StarMap({visitedIdx,nextKey,onLaunch}){
  const [traveling,setTraveling]=useState(false);
  const [shipPos,setShipPos]=useState(null);
  const curKey=MAP_PATH[visitedIdx];
  const cur=MAP_NODES[curKey];
  const next=MAP_NODES[nextKey];

  const handleLaunch=()=>{
    if(traveling)return;
    setTraveling(true);
    setShipPos({x:cur.x,y:cur.y});
    setTimeout(()=>{ setShipPos({x:next.x,y:next.y}); },80);
    setTimeout(()=>{ setTraveling(false); onLaunch(); },2200);
  };

  const edges=[];
  for(let i=0;i<MAP_PATH.length-1;i++){
    const a=MAP_NODES[MAP_PATH[i]],b=MAP_NODES[MAP_PATH[i+1]];
    edges.push({x1:a.x,y1:a.y,x2:b.x,y2:b.y,done:i<visitedIdx});
  }

  const BG_STARS=[[95,48,2],[210,335,1.5],[392,38,2.5],[555,368,1.5],[715,55,2],[788,345,1.5],[845,42,3],[140,280,1],[460,22,1.8],[630,350,1.2]];

  return(
    <div style={{position:'fixed',inset:0,zIndex:50,overflow:'hidden'}}>
      {/* Layered deep-space backgrounds */}
      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 62% 42%, #0d1e4a 0%, #060f1e 40%, #010408 100%)'}}/>
      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 12% 68%, rgba(80,20,170,.24) 0%, transparent 48%)'}}/>
      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 88% 22%, rgba(0,70,200,.16) 0%, transparent 42%)'}}/>
      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 50% 95%, rgba(0,30,90,.22) 0%, transparent 38%)'}}/>
      <Starfield/>
      <div style={{position:'absolute',inset:0,background:'repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.015) 3px,rgba(0,0,0,.015) 6px)',pointerEvents:'none'}}/>

      <div style={{position:'relative',zIndex:10,width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <div className="f-orb" style={{fontSize:10,color:'rgba(0,212,255,.38)',letterSpacing:6,marginBottom:4}}>NAVIGATION SYSTEM</div>
        <div className="f-orb" style={{fontSize:16,color:'#00D4FF',letterSpacing:3,marginBottom:14,textShadow:'0 0 30px #00D4FF'}}>
          EXOTRAIL ROUTE MAP
        </div>

        <div style={{width:'100%',maxWidth:980,padding:'0 12px',position:'relative'}}>
          <svg width="100%" viewBox="0 0 920 380" style={{overflow:'visible',display:'block'}}>
            <defs>
              <radialGradient id="smEarthG" cx="35%" cy="30%">
                <stop offset="0%" stopColor="#a8eeff"/><stop offset="40%" stopColor="#3aabda"/><stop offset="100%" stopColor="#093e6e"/>
              </radialGradient>
              <radialGradient id="smOrgaG" cx="32%" cy="28%">
                <stop offset="0%" stopColor="#b0ffcc"/><stop offset="100%" stopColor="#005c30"/>
              </radialGradient>
              <radialGradient id="smCostusG" cx="32%" cy="28%">
                <stop offset="0%" stopColor="#ffd090"/><stop offset="100%" stopColor="#7a3a00"/>
              </radialGradient>
              <radialGradient id="smBudgetG" cx="32%" cy="28%">
                <stop offset="0%" stopColor="#b0f0ff"/><stop offset="100%" stopColor="#005a80"/>
              </radialGradient>
              <radialGradient id="smRiskarG" cx="32%" cy="28%">
                <stop offset="0%" stopColor="#ff9980"/><stop offset="100%" stopColor="#7a0000"/>
              </radialGradient>
              <filter id="smGlow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="5" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <filter id="smEarthGlow" x="-80%" y="-80%" width="260%" height="260%">
                <feGaussianBlur stdDeviation="12" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>

            {/* ── NEBULA BACKGROUND ── */}
            <ellipse cx="460" cy="195" rx="430" ry="145" fill="rgba(28,14,72,.09)" filter="url(#smGlow)"/>
            <ellipse cx="830" cy="140" rx="170" ry="130" fill="rgba(0,55,155,.1)" filter="url(#smGlow)"/>
            <ellipse cx="190" cy="310" rx="130" ry="75" fill="rgba(55,18,110,.08)" filter="url(#smGlow)"/>
            <ellipse cx="480" cy="358" rx="410" ry="35" fill="rgba(160,140,255,.022)" filter="url(#smGlow)"/>

            {/* ── BACKGROUND STARS (extra) ── */}
            {BG_STARS.map(([x,y,r],i)=>(
              <circle key={i} cx={x} cy={y} r={r} fill="white" opacity=".55">
                <animate attributeName="opacity" values=".25;.85;.25" dur={`${2.2+i*.35}s`} begin={`${i*.3}s`} repeatCount="indefinite"/>
              </circle>
            ))}

            {/* ── PATH EDGES ── */}
            {edges.map((e,i)=>(
              <g key={i}>
                <line x1={e.x1} y1={e.y1} x2={e.x2} y2={e.y2}
                  stroke="rgba(255,255,255,.09)" strokeWidth="1.5" strokeDasharray="7 6"/>
                {e.done&&<>
                  <line x1={e.x1} y1={e.y1} x2={e.x2} y2={e.y2}
                    stroke="rgba(0,212,255,.22)" strokeWidth="7"/>
                  <line x1={e.x1} y1={e.y1} x2={e.x2} y2={e.y2}
                    stroke="#00D4FF" strokeWidth="2"
                    style={{filter:'drop-shadow(0 0 5px #00D4FF)'}}/>
                </>}
              </g>
            ))}

            {/* ── PLANETS ── */}
            {Object.entries(MAP_NODES).map(([key,node])=>{
              if(node.isStart) return null;
              const visited=MAP_PATH.slice(0,visitedIdx+1).includes(key);
              const isNext=key===nextKey;
              const isCur=key===curKey;
              const isEarth=key==='earth';
              const r=node.r;
              const gid=isEarth?'smEarthG':key==='orga'?'smOrgaG':key==='costus'?'smCostusG':key==='budgetron'?'smBudgetG':'smRiskarG';
              const active=visited||isNext||isEarth;
              return(
                <g key={key} style={{cursor:isNext?'pointer':'default'}} onClick={isNext?handleLaunch:undefined}>
                  {/* Outer atmosphere pulse */}
                  {active&&<circle cx={node.x} cy={node.y} r={r+16} fill={node.color} opacity=".05">
                    <animate attributeName="r" values={`${r+12};${r+26};${r+12}`} dur={isEarth?"4.5s":"3.2s"} repeatCount="indefinite"/>
                    <animate attributeName="opacity" values=".05;.01;.05" dur={isEarth?"4.5s":"3.2s"} repeatCount="indefinite"/>
                  </circle>}
                  {/* Halo ring */}
                  {active&&<circle cx={node.x} cy={node.y} r={r+7}
                    fill="none" stroke={node.color} strokeWidth={isEarth?1.5:1} opacity={isNext?.45:visited?.2:.12}/>}
                  {/* Next-planet alert pulse */}
                  {isNext&&<circle cx={node.x} cy={node.y} r={r+5} fill="none" stroke={node.color} strokeWidth="2.5" opacity=".7">
                    <animate attributeName="r" values={`${r+5};${r+22};${r+5}`} dur="1.5s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" values=".7;0;.7" dur="1.5s" repeatCount="indefinite"/>
                  </circle>}
                  {/* Planet sphere */}
                  <circle cx={node.x} cy={node.y} r={r}
                    fill={active?`url(#${gid})`:'rgba(255,255,255,.04)'}
                    stroke={active?node.color:'rgba(255,255,255,.15)'}
                    strokeWidth={isEarth?2.5:isNext?2:1.5}
                    filter={active?`url(#${isEarth?'smEarthGlow':'smGlow'})`:'none'}/>
                  {/* Specular highlight */}
                  {active&&<ellipse cx={node.x-r*.33} cy={node.y-r*.33} rx={r*.28} ry={r*.17}
                    fill="white" opacity=".28" transform={`rotate(-25,${node.x},${node.y})`}/>}
                  {/* Earth: continents + atmosphere ring */}
                  {isEarth&&<>
                    <ellipse cx={node.x+11} cy={node.y-8} rx={10} ry={7} fill="rgba(0,210,80,.28)"/>
                    <ellipse cx={node.x-13} cy={node.y+9} rx={8} ry={5} fill="rgba(0,210,80,.22)"/>
                    <ellipse cx={node.x-3} cy={node.y-15} rx={6} ry={4} fill="rgba(0,210,80,.18)"/>
                    <circle cx={node.x} cy={node.y} r={r+5} fill="none" stroke="#4FC3F7" strokeWidth="3" opacity=".16"/>
                  </>}
                  {/* Status tags */}
                  {visited&&!isCur&&<text x={node.x} y={node.y-r-14} textAnchor="middle" fontSize="8.5" fill="#00FF88" fontFamily="Orbitron">✓ FIXED</text>}
                  {isNext&&<text x={node.x} y={node.y-r-16} textAnchor="middle" fontSize="8" fill={node.color} fontFamily="Orbitron" style={{animation:'pulseBright .9s ease-in-out infinite'}}>► NEXT</text>}
                  {isEarth&&<text x={node.x} y={node.y-r-17} textAnchor="middle" fontSize={nextKey==='earth'?10:8} fill={node.color} fontFamily="Orbitron" opacity={nextKey==='earth'?1:.5} style={{textShadow:`0 0 14px ${node.color}`}}>DESTINATION</text>}
                  {/* Planet name */}
                  <text x={node.x} y={node.y+r+15} textAnchor="middle" fontSize={isEarth?11:8.5}
                    fill={node.color} fontFamily="Orbitron" opacity={active?.92:.25}>{node.name}</text>
                  <text x={node.x} y={node.y+r+26} textAnchor="middle" fontSize="6.5"
                    fill="rgba(255,255,255,.38)">{node.sub}</text>
                </g>

            })}

            {/* ── SHIP ── */}
            {shipPos?(
              <text x={shipPos.x} y={shipPos.y-24} textAnchor="middle" fontSize="24"
                style={{transition:'all 2s ease-in-out',filter:'drop-shadow(0 0 12px #00D4FF) drop-shadow(0 0 4px white)'}}>🛸</text>
            ):(
              <text x={cur.x} y={cur.y-24} textAnchor="middle" fontSize="24"
                style={{filter:'drop-shadow(0 0 10px #00D4FF)',animation:'floatY 2.5s ease-in-out infinite'}}>🛸</text>
            )}
          </svg>
        </div>

        {/* Launch button */}
        <div style={{textAlign:'center',marginTop:12}}>
          <button onClick={handleLaunch} disabled={traveling} className="f-orb"
            style={{fontSize:13,padding:'11px 34px',borderRadius:8,
              border:`2px solid ${next?.color||'#00D4FF'}`,
              color:next?.color||'#00D4FF',
              background:`${next?.color||'#00D4FF'}14`,
              cursor:traveling?'default':'pointer',letterSpacing:2,
              boxShadow:`0 0 26px ${next?.color||'#00D4FF'}28`,
              opacity:traveling?.45:1,transition:'all .3s'}}>
            {traveling?'LAUNCHING...':'🚀 LAUNCH TO '+(next?.name||nextKey.toUpperCase())}
          </button>
        </div>
      </div>
    </div>
  );
}

function RepairAnim({repair,onDone}){
  const [phase,setPhase]=useState('spin');
  useEffect(()=>{
    const t1=setTimeout(()=>setPhase('lock'),1600);
    const t2=setTimeout(()=>setPhase('done'),2600);
    const t3=setTimeout(()=>onDone(),3800);
    return()=>{clearTimeout(t1);clearTimeout(t2);clearTimeout(t3);};
  },[]);
  return(
    <div onClick={phase==='done'?onDone:undefined} style={{position:'fixed',inset:0,zIndex:60,background:'rgba(0,0,0,.85)',backdropFilter:'blur(10px)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:28,cursor:phase==='done'?'pointer':'default'}}>
      <div style={{fontSize:90,
        animation:phase==='spin'?'spin .45s linear infinite':phase==='lock'?'lockIn .6s ease-out forwards':'none',
        filter:phase==='done'?`drop-shadow(0 0 35px ${repair.color})`:'none',transition:'filter .5s'}}>
        {phase==='done'?'✅':repair.emoji}
      </div>
      <div className="f-orb" style={{fontSize:20,letterSpacing:3,color:phase==='done'?'#00FF88':repair.color,textShadow:`0 0 20px ${phase==='done'?'#00FF88':repair.color}`,transition:'all .5s'}}>
        {phase==='spin'&&'REPAIRING...'}{phase==='lock'&&'LOCKING IN...'}{phase==='done'&&repair.sys+' RESTORED ✅'}
      </div>
      {phase==='done'&&<div className="f-mono pulse" style={{fontSize:12,color:'rgba(0,255,136,.7)'}}>Click to continue</div>}
      {phase==='done'&&<div style={{position:'fixed',inset:0,background:'rgba(0,255,136,.06)',pointerEvents:'none',animation:'greenPop .6s ease-out'}}/>}
    </div>
  );
}

function CinemaBar({chapter,dIdx,onNext,onBack,canGoBack,onTogglePanel,onToggleTheory}){
  const dlg=chapter.dialogues[dIdx];
  const [text,setText]=useState('');
  const [typing,setTyping]=useState(false);
  const timer=useRef(null);

  useEffect(()=>{
    if(!dlg)return;
    setText('');setTyping(true);
    let i=0;const s=dlg.text;
    timer.current=setInterval(()=>{
      i++;setText(s.slice(0,i));
      if(i>=s.length){setTyping(false);clearInterval(timer.current);}
    },15);
    return()=>clearInterval(timer.current);
  },[dIdx,chapter.id]);

  const handleClick=()=>{
    if(typing){clearInterval(timer.current);setText(dlg.text);setTyping(false);}
    else onNext();
  };

  if(!dlg)return null;
  const c=CHARS[dlg.char];
  const isLast=dIdx>=chapter.dialogues.length-1;

  return(
    <div className="cinema-bar" onClick={handleClick}>
      <div className="cinema-inner">
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
          <span className="f-orb" style={{fontSize:12,color:c.color,letterSpacing:1}}>{c.name}</span>
          <span style={{fontSize:10,color:'rgba(255,255,255,.3)',fontStyle:'italic'}}>{c.role}</span>
          <div style={{flex:1}}/>
          {chapter.dataPanel&&<button onClick={e=>{e.stopPropagation();onTogglePanel();}} className="f-mono" style={{fontSize:10,padding:'3px 9px',border:'1px solid rgba(0,212,255,.35)',borderRadius:5,color:'#00D4FF',background:'rgba(0,212,255,.08)',cursor:'pointer'}}>📊 Data</button>}
          {chapter.theoryBox&&<button onClick={e=>{e.stopPropagation();onToggleTheory();}} className="f-mono" style={{fontSize:10,padding:'3px 9px',border:'1px solid rgba(123,47,255,.35)',borderRadius:5,color:'#7B2FFF',background:'rgba(123,47,255,.08)',cursor:'pointer'}}>📖 Theory</button>}
        </div>
        <div style={{borderLeft:`3px solid ${c.color}`,paddingLeft:12,minHeight:52}}>
          <p style={{fontSize:15,lineHeight:1.65,color:'rgba(232,240,255,.94)'}}>
            {text}{typing&&<span style={{color:c.color,animation:'pulseBright .5s ease-in-out infinite'}}>▋</span>}
          </p>
          {!typing&&dlg.text.toLowerCase().includes('per the interview conducted with the exotrail employee')&&(
            <p style={{fontSize:11,fontStyle:'italic',color:'#00D4FF',opacity:.75,marginTop:5}}>
              - Interview with Exotrail employee, Chief Fluid System Engineer
            </p>
          )}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {canGoBack&&(
              <button onClick={e=>{e.stopPropagation();onBack();}} className="f-mono"
                style={{fontSize:10,color:c.color,opacity:.75,background:'none',border:'none',cursor:'pointer',padding:0}}>
                ◀ Go Back
              </button>
            )}
            <div style={{display:'flex',gap:6}}>
              {chapter.dialogues.map((_,i)=>(
                <div key={i} style={{height:3,borderRadius:1.5,width:i===dIdx?18:5,
                  background:i<dIdx?'#00FF88':i===dIdx?c.color:'rgba(255,255,255,.15)',transition:'all .3s'}}/>
              ))}
            </div>
          </div>
          {typing
            ?<span className="f-mono" style={{fontSize:10,color:'rgba(255,255,255,.2)'}}>click to skip ▶</span>
            :<span className="f-mono pulse" style={{fontSize:10,color:c.color}}>
              {isLast?(chapter.repair?'⚙️ ACTIVATE REPAIR ▶▶':'🚀 CONTINUE ▶▶'):'click to continue ▶'}
            </span>}
        </div>
      </div>
    </div>
  );
}

function ForecastChart(){
  const W=340,H=150,pL=38,pB=26,pT=10,pR=12;
  const cW=W-pL-pR,cH=H-pB-pT;
  const tx=m=>pL+(m/24)*cW, ty=v=>H-pB-(v/22)*cH;
  const budget=Array.from({length:25},(_,m)=>m*.5);
  const actual=Array.from({length:25},(_,m)=>m<=14?m*.56:7.84+(m-14)*1.05);
  const forecast=Array.from({length:25},(_,m)=>m<6?m*.5:m<12?m*.58+.15:m<18?m*.68+.6:m*.74+.9);
  const pts=d=>d.map((v,i)=>`${tx(i).toFixed(1)},${ty(v).toFixed(1)}`).join(' ');
  return(
    <div className="monitor-panel">
      <div className="f-orb" style={{fontSize:11,color:'#00FF88',letterSpacing:2,marginBottom:10}}>ROLLING FORECAST vs BUDGET</div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}>
        {[0,5,10,15,20].map(v=><line key={v} x1={pL} y1={ty(v)} x2={W-pR} y2={ty(v)} stroke="rgba(0,255,136,.08)" strokeWidth=".8"/>)}
        {[0,10,20].map(v=><text key={v} x={pL-4} y={ty(v)+3} textAnchor="end" fill="rgba(0,255,136,.4)" fontSize="7" fontFamily="Space Mono">€{v}M</text>)}
        {[0,6,12,18,24].map(m=><text key={m} x={tx(m)} y={H-7} textAnchor="middle" fill="rgba(0,255,136,.4)" fontSize="7" fontFamily="Space Mono">M{m}</text>)}
        <polyline points={pts(budget)} fill="none" stroke="#00BFFF" strokeWidth="1.5" strokeDasharray="5 3"/>
        <polyline points={pts(actual)} fill="none" stroke="#FF4D4D" strokeWidth="2"/>
        <polyline points={pts(forecast)} fill="none" stroke="#00FF88" strokeWidth="1.5" strokeDasharray="8 4"/>
        <line x1={tx(14)} y1={pT} x2={tx(14)} y2={ty(actual[14])} stroke="#FF4D4D" strokeWidth="1" strokeDasharray="2 2"/>
        <text x={tx(14)+4} y={pT+12} fill="#FF4D4D" fontSize="7" fontFamily="Space Mono">⚠️ M14 overrun</text>
      </svg>
      <div style={{display:'flex',gap:12,marginTop:6}}>
        {[['#00BFFF','Budget'],['#FF4D4D','Actual'],['#00FF88','Forecast']].map(([c,l])=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:14,height:2,background:c}}/>
            <span className="f-mono" style={{fontSize:9,color:'rgba(0,255,136,.5)'}}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

          <p className="f-mono" style={{fontSize:11,color:'rgba(255,255,255,.3)',marginBottom:16}}>● {100-pct}% duplicated/unclear</p>

            {after?'← Before MAC':'After MAC →'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   POWER BAR
═══════════════════════════════════════ */
function PowerBar({power}){
  const col=power<=10?'#FF4D4D':power<=32?'#FF8C00':power<=55?'#FFD700':'#00FF88';
  const glow=power<=10?'rgba(255,77,77,.5)':power<=32?'rgba(255,140,0,.4)':power<=55?'rgba(255,215,0,.4)':'rgba(0,255,136,.5)';
  const isPulsing=power<=10;
  return(
    <div style={{position:'fixed',top:214,left:12,zIndex:45,userSelect:'none',width:162}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:3}}>
        <span className="f-orb" style={{fontSize:8,color:col,letterSpacing:1,opacity:.85}}>⚡ POWER</span>
        <span className="f-orb" style={{fontSize:8,color:col,opacity:.85,
          animation:isPulsing?'pulseBright 1.8s ease-in-out infinite':power===100?'pulseBright .6s ease-in-out 3':'none'}}>
          {power}%
        </span>
      </div>
      <div style={{width:'100%',height:6,background:'rgba(255,255,255,.08)',borderRadius:3,overflow:'hidden',position:'relative'}}>
        <div style={{
          position:'absolute',left:0,top:0,height:'100%',
          width:`${power}%`,
          background:col,
          borderRadius:3,
          boxShadow:`0 0 8px ${glow}`,
          transition:'width 1.5s ease-out, background-color 1.5s ease-out',
        }}/>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   NAV BAR

const ET_ICON=(
  <svg width="28" height="24" viewBox="0 0 28 24">

  </svg>
);
const ROCKET_ICON=(
  <svg width="22" height="28" viewBox="0 0 22 28">
    <polygon points="11,1 17,10 5,10" fill="white" opacity=".9"/>
    <rect x="6" y="10" width="10" height="12" rx="2" fill="white" opacity=".9"/>
    <polygon points="4,16 6,12 6,22" fill="white" opacity=".7"/>
    <polygon points="18,16 16,12 16,22" fill="white" opacity=".7"/>
    <ellipse cx="11" cy="24" rx="4" ry="3" fill="#00D4FF" opacity=".7"/>

  </svg>
);

const MAP_STOPS=[
  {ch:0, pct:3,  emoji:'🚀',label:'START', theme:'Incident',color:'#00D4FF'},
  {ch:1, pct:13, emoji:'🟢',label:'ORGA',  theme:'Org.',   color:'#00FF88'},
  {ch:2, pct:25, emoji:'🟠',label:'COSTUS',theme:'Cost',   color:'#FF8C00'},
  {ch:3, pct:42, emoji:'🔵',label:'BUDGET',theme:'Forecast',color:'#00BFFF'},
  {ch:4, pct:62, emoji:'🔴',label:'RISKAR',theme:'Risk',   color:'#FF4D4D'},
  {ch:5, pct:96, emoji:'🌍',label:'EARTH', theme:'HOME',   color:'#4FC3F7'},
];

function NavBar({chIdx,onGlossary,onExotrail,onSector}){
  const capIdx=Math.min(chIdx,5);
  const capX=MAP_STOPS[capIdx].pct;
  return(
    <div style={{position:'fixed',top:0,left:0,right:0,zIndex:50,background:'rgba(4,7,18,.95)',backdropFilter:'blur(12px)',borderBottom:'1px solid rgba(255,255,255,.06)',padding:'6px 16px 10px'}}>
      <div style={{maxWidth:1100,margin:'0 auto',display:'flex',alignItems:'center',gap:10}}>
        <span className="f-orb" style={{fontSize:9,color:'rgba(0,212,255,.45)',whiteSpace:'nowrap',minWidth:70}}>🛸 EXOTRAIL-7</span>
        {/* LINEAR JOURNEY MAP */}
        <div style={{flex:1,position:'relative',height:46,minWidth:0,overflow:'visible'}}>
          {/* Background dashed line */}
          <div style={{position:'absolute',top:'38%',left:'3%',right:'4%',height:0,borderTop:'1px dashed rgba(255,255,255,.18)',pointerEvents:'none'}}/>
          {/* Solid traveled line */}
          <div style={{position:'absolute',top:'38%',left:'3%',width:`${capX-3}%`,height:2,marginTop:-1,background:'rgba(0,212,255,.6)',transition:'width .9s ease',pointerEvents:'none',boxShadow:'0 0 6px rgba(0,212,255,.4)'}}/>
          {/* Capsule */}
          <div style={{position:'absolute',top:'4%',left:`${capX}%`,transform:'translateX(-50%)',fontSize:14,filter:'drop-shadow(0 0 5px #00D4FF)',transition:'left 1s ease-in-out',animation:'floatY2 3s ease-in-out infinite',zIndex:2}}>🛸</div>
          {/* HOME badge */}
          {chIdx===5&&<div style={{position:'absolute',left:'96%',top:0,transform:'translateX(-50%)',fontSize:8,color:'#4FC3F7',fontFamily:'Orbitron',textShadow:'0 0 8px #4FC3F7',whiteSpace:'nowrap'}}>🏠 HOME</div>}
          {/* Planet stops */}
          {MAP_STOPS.map((s)=>{
            const done=chIdx>s.ch;
            const cur=chIdx===s.ch;
            const future=chIdx<s.ch;
            const isEarth=s.ch===5;
            const r=isEarth?9:cur?7:done?6:5;
            return(
              <div key={s.ch} style={{position:'absolute',left:`${s.pct}%`,top:'28%',transform:'translateX(-50%)',display:'flex',flexDirection:'column',alignItems:'center',gap:1,pointerEvents:'none'}}>
                {/* Circle */}
                <div style={{
                  width:r*2,height:r*2,borderRadius:'50%',
                  background:done||cur?s.color+'33':'rgba(255,255,255,.06)',
                  border:`${cur?2:1.5}px solid ${done||cur?s.color:'rgba(255,255,255,.2)'}`,
                  boxShadow:cur?`0 0 8px ${s.color}`:'none',
                  transition:'all .4s',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  animation:cur?'pulseBright 2s ease-in-out infinite':'none',
                }}>
                  {done&&<span style={{fontSize:r-1}}>✓</span>}
                </div>
                {/* Label */}
                <span className="f-orb" style={{fontSize:6,color:done||cur?s.color:'rgba(255,255,255,.3)',letterSpacing:.5,marginTop:1,whiteSpace:'nowrap',textShadow:isEarth&&(done||cur)?`0 0 6px ${s.color}`:'none'}}>
                  {s.label}
                </span>
                {/* Theme */}
                <span style={{fontSize:5,color:'rgba(255,255,255,.25)',whiteSpace:'nowrap'}}>{s.theme}</span>
                {/* Lock */}
                {future&&!isEarth&&<span style={{fontSize:6,opacity:.3,marginTop:1}}>🔒</span>}
                {isEarth&&future&&<span style={{fontSize:8,opacity:.35,marginTop:1}}>🌍</span>}
              </div>
            );
          })}
        </div>
        {/* Right buttons */}
        <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
          <button onClick={onExotrail} title="Exotrail Info" style={{background:'rgba(0,212,255,.08)',border:'1px solid rgba(0,212,255,.3)',borderRadius:6,cursor:'pointer',padding:'3px 7px',display:'flex',alignItems:'center'}}>{ET_ICON}</button>
          <button onClick={onSector} title="Space Sector Info" style={{background:'rgba(123,47,255,.08)',border:'1px solid rgba(123,47,255,.3)',borderRadius:6,cursor:'pointer',padding:'3px 7px',display:'flex',alignItems:'center'}}>{ROCKET_ICON}</button>
          <button onClick={onGlossary} className="f-mono" style={{fontSize:10,padding:'4px 10px',border:'1px solid rgba(255,255,255,.12)',borderRadius:6,color:'rgba(255,255,255,.4)',background:'none',cursor:'pointer',whiteSpace:'nowrap'}}>📖 Glossary</button>
        </div>
      </div>
    </div>
  );
}

const EXOTRAIL_PANEL={
  title:'EXOTRAIL',color:'#00D4FF',
  items:[
    {l:'Founded',       v:'2019, Paris, France'},
    {l:'Product',       v:'Hall-effect electric thrusters (SpaceDrive®) for nanosatellites and small satellites'},
    {l:'Customers',     v:'Satellite manufacturers'},
    {l:'Price range',   v:'Hundreds of thousands of euros per propulsion system'},
    {l:'Funding',       v:'Fundraising rounds + milestone-based customer contracts'},
    {l:'Team',          v:'~100 employees (fast-growing deep-tech startup)'},
    {l:'MAC challenge', v:'Delivering complex R&D hardware on schedule and within budget without a costing system, risk management process, or rolling forecasts'},
  ]
};
const SECTOR_PANEL={
  title:'SPACE SECTOR',color:'#7B2FFF',
  items:[
    {l:'Global space economy',  v:'~$640 billion (2024), projected $1 trillion by 2040'},
    {l:'New Space era',         v:'Private players (SpaceX, Exotrail, Latitude) disrupting legacy contractors (ArianeGroup, Airbus Defence & Space)'},
    {l:'Core challenge',        v:'Delivering complex, long-duration programs under extreme technical and financial uncertainty'},
    {l:'Ariane 6 case',         v:'Launched 2015, first flight planned 2020, actual launch 2024: 4-year delay'},
    {l:'Root causes',           v:'Multi-stakeholder governance (15-20 nations via ESA), new technology risk, thin planning margins'},
    {l:'Key insight',           v:'Cost overruns are systemic across the sector, not an exception'},
  ]
};

/* ═══════════════════════════════════════
   MAIN APP
═══════════════════════════════════════ */
const STARMAP_AFTER=[0,1,2,3,4]; // chapter IDs that show star map after completion
const NEXT_DEST={0:'orga',1:'costus',2:'budgetron',3:'riskar',4:'earth'};

function App(){
  const [chIdx,setChIdx]=useState(0);
  const [dIdx,setDIdx]=useState(0);
  const [phase,setPhase]=useState('scene'); // 'scene'|'starmap'|'dashboard'
  const [showPanel,setShowPanel]=useState(false);
  const [showTheory,setShowTheory]=useState(false);
  const [showRepair,setShowRepair]=useState(false);
  const [showGloss,setShowGloss]=useState(false);
  const [showExotrail,setShowExotrail]=useState(false);
  const [showSector,setShowSector]=useState(false);
  const [repairs,setRepairs]=useState([false,false,false,false]);
  const [alarm,setAlarm]=useState(false);
  const POWER_LEVELS=[10,32,55,80,100];
  const power=POWER_LEVELS[repairs.filter(Boolean).length];

  const ch=CHAPTERS[chIdx];
  const dlg=ch.dialogues[dIdx];
  const isLast=dIdx>=ch.dialogues.length-1;

  useEffect(()=>{
    if(dlg?.special==='alarm'){setAlarm(true);const t=setTimeout(()=>setAlarm(false),2200);return()=>clearTimeout(t);}
  },[dIdx,chIdx]);
  useEffect(()=>{
    if(dlg?.special==='dataPanel')setShowPanel(true);
    if(dlg?.special==='theoryBox')setShowTheory(true);
  },[dIdx,chIdx]);

  const goTo=useCallback((i)=>{
    setChIdx(i);setDIdx(0);setShowPanel(false);setShowTheory(false);setShowRepair(false);
    setPhase(i===6?'dashboard':'scene');
  },[]);

  const handleNext=useCallback(()=>{
    if(!dlg)return;
    if(dlg.special==='repair'){
      const pi=chIdx-1;
      if(pi<0||pi>3||!repairs[pi])setShowRepair(true);
      else setDIdx(i=>i+1);
      return;
    }
    if(isLast){
      if(STARMAP_AFTER.includes(chIdx)){
        setPhase('starmap');
      } else if(chIdx<CHAPTERS.length-1){
        goTo(chIdx+1);
      }
    } else {
      setDIdx(i=>i+1);
    }
  },[dlg,isLast,chIdx,goTo,repairs]);

  const handleBack=useCallback(()=>{
    if(dIdx>0){
      setDIdx(i=>i-1);
    } else if(chIdx>0){
      const prevCh=CHAPTERS[chIdx-1];
      setChIdx(chIdx-1);
      setDIdx(prevCh.dialogues.length-1);
      setPhase('scene');
      setShowPanel(false);setShowTheory(false);
    }
  },[dIdx,chIdx]);
  const canGoBack=!(chIdx===0&&dIdx===0);

  const handleRepairDone=useCallback(()=>{
    setShowRepair(false);
    const pi=chIdx-1;
    if(pi>=0&&pi<4)setRepairs(r=>{const n=[...r];n[pi]=true;return n;});
    setDIdx(i=>i+1);
  },[chIdx]);

  const handleLaunch=useCallback(()=>{
    goTo(chIdx+1);
  },[chIdx,goTo]);

  // Which characters to show in scene
  const leftChar=useMemo(()=>{
    if(!dlg)return null;
    if(['SEBASTIAN'].includes(dlg.char))return null;
    return ['ALPHA','BETA'].includes(dlg.char)?dlg.char:
      ch.dialogues.find(d=>['ALPHA','BETA'].includes(d.char))?.char||null;
  },[dlg,ch]);
  const rightChar=useMemo(()=>{
    if(!dlg)return null;
    if(['ALPHA','BETA','SEBASTIAN'].includes(dlg.char))return null;
    return dlg.char;
  },[dlg]);
  const centerChar=useMemo(()=>{
    if(!dlg)return null;
    return dlg.char==='SEBASTIAN'?'SEBASTIAN':null;
  },[dlg]);

  const isDash=phase==='dashboard';
  const isMap=phase==='starmap';

  return(
    <div style={{position:'fixed',inset:0,overflow:'hidden',background:'#060912'}}>
      {alarm&&<div style={{position:'fixed',inset:0,zIndex:56,pointerEvents:'none',animation:'redFlash .35s ease-in-out 5'}}/>}
      {power===10&&!isDash&&<div style={{position:'fixed',inset:0,zIndex:57,pointerEvents:'none',boxShadow:'inset 0 0 70px rgba(255,77,77,.22)',animation:'pulseBright 2s ease-in-out infinite'}}/>}
      <Starfield/>
      {!isDash&&!isMap&&<SceneBg chapter={ch}/>}
      {isDash&&<Dashboard/>}
      {isMap&&<StarMap visitedIdx={chIdx} nextKey={NEXT_DEST[chIdx]} onLaunch={handleLaunch}/>}
      {!isDash&&<NavBar chIdx={chIdx} onGlossary={()=>setShowGloss(true)} onExotrail={()=>setShowExotrail(s=>!s)} onSector={()=>setShowSector(s=>!s)}/>}
      {!isDash&&!isMap&&<SpacecraftView repairs={repairs}/>}
      {!isDash&&!isMap&&<PowerBar power={power}/>}

      {/* SCENE CHARACTERS */}
      {!isDash&&!isMap&&(
        <div style={{position:'fixed',inset:0,zIndex:10,pointerEvents:'none',display:'flex',alignItems:'flex-end',justifyContent:'space-between',paddingBottom:165,paddingLeft:24,paddingRight:24}}>
          {/* Left character */}
          <div className="char-float" style={{opacity:dlg&&['ALPHA','BETA'].includes(dlg.char)?1:.55,transition:'opacity .5s',transform:dlg&&['ALPHA','BETA'].includes(dlg.char)?'scale(1.04)':'scale(1)',transformOrigin:'bottom center'}}>
            {leftChar&&<CharSprite charKey={leftChar} h={window.innerHeight*.42}/>}
          </div>
          {/* Center (Sebastian) */}
          {centerChar&&(
            <div className="char-float2" style={{position:'absolute',left:'50%',transform:'translateX(-50%)',bottom:160,opacity:1,zIndex:12}}>
              <CharSprite charKey="SEBASTIAN" h={window.innerHeight*.44}/>
            </div>
          )}
          {/* Right character */}
          <div className="char-float2" style={{opacity:dlg&&!['ALPHA','BETA','SEBASTIAN'].includes(dlg.char)?1:.55,transition:'opacity .5s',transform:dlg&&!['ALPHA','BETA','SEBASTIAN'].includes(dlg.char)?'scale(1.04)':'scale(1)',transformOrigin:'bottom center'}}>
            {rightChar&&<CharSprite charKey={rightChar} h={window.innerHeight*.42}/>}
          </div>
        </div>
      )}

      {/* Planet header (scene only) */}
      {!isDash&&!isMap&&ch.planet&&(
        <div className="anim-fade" style={{position:'fixed',top:70,left:'50%',transform:'translateX(-50%)',zIndex:30,textAlign:'center'}}>
          <div className="f-orb" style={{fontSize:15,color:ch.planet.color,border:`1px solid ${ch.planet.color}50`,borderRadius:30,padding:'4px 20px',boxShadow:`0 0 20px ${ch.planet.color}30`,textShadow:`0 0 12px ${ch.planet.color}`}}>
            {ch.planet.emoji} {ch.planet.name}
          </div>
        </div>
      )}

      {/* Cinematic dialogue bar */}
      {!isDash&&!isMap&&ch.dialogues.length>0&&(
        <CinemaBar chapter={ch} dIdx={dIdx} onNext={handleNext} onBack={handleBack} canGoBack={canGoBack} onTogglePanel={()=>setShowPanel(s=>!s)} onToggleTheory={()=>setShowTheory(s=>!s)}/>
      )}

      {/* Earth chapter   chapter advance button when no repair */}
      {!isDash&&!isMap&&ch.dialogues.length>0&&chIdx===5&&isLast&&(
        <div style={{position:'fixed',bottom:165,left:'50%',transform:'translateX(-50%)',zIndex:42}}>
          <button onClick={()=>goTo(6)} className="f-orb" style={{fontSize:13,padding:'10px 32px',borderRadius:8,border:'2px solid #FFD700',color:'#FFD700',background:'rgba(255,215,0,.1)',cursor:'pointer',letterSpacing:2,boxShadow:'0 0 20px rgba(255,215,0,.3)'}}>
            📊 VIEW MAC DASHBOARD
          </button>
        </div>
      )}

      {/* Overlays */}
      {showPanel&&ch.dataPanel&&<DataPanel panel={ch.dataPanel} onClose={()=>setShowPanel(false)}/>}
      {showTheory&&ch.theoryBox&&<TheoryModal box={ch.theoryBox} onClose={()=>setShowTheory(false)}/>}
      {showRepair&&ch.repair&&<RepairAnim repair={ch.repair} onDone={handleRepairDone}/>}
      {showGloss&&<GlossModal onClose={()=>setShowGloss(false)}/>}
      {showExotrail&&<DataPanel panel={EXOTRAIL_PANEL} onClose={()=>setShowExotrail(false)}/>}
      {showSector&&<DataPanel panel={SECTOR_PANEL} onClose={()=>setShowSector(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
