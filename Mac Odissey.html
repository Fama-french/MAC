<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060912;color:#E8F0FF;overflow:hidden;height:100vh;width:100vw;font-family:'Inter',sans-serif}
.f-orb{font-family:'Orbitron',sans-serif}
.f-mono{font-family:'Space Mono',monospace}

@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.9}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes floatY2{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideInR{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulseBright{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes lockIn{0%{transform:scale(1)rotate(0)}60%{transform:scale(1.5)rotate(15deg)}100%{transform:scale(1)rotate(0)}}
@keyframes redFlash{0%,100%{background:transparent}50%{background:rgba(255,77,77,.2)}}
@keyframes greenPop{0%{background:transparent}50%{background:rgba(0,255,136,.18)}100%{background:transparent}}
@keyframes terrainDrift{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes starDrift{0%{transform:translateX(0)}100%{transform:translateX(-33.33%)}}
@keyframes lightning{0%,89%,100%{opacity:0}90%,96%{opacity:1}93%,99%{opacity:.4}}
@keyframes coinFloat{0%{transform:translateY(0) rotate(0)}50%{transform:translateY(-20px) rotate(180deg)}100%{transform:translateY(0) rotate(360deg)}}
@keyframes dataLine{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
@keyframes crtScan{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes barGrow{from{height:0}to{height:var(--h)}}
@keyframes lineGrow{from{stroke-dashoffset:800}to{stroke-dashoffset:0}}
@keyframes travelShip{0%{left:-8%}100%{left:110%}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}

.char-float{animation:floatY 3.5s ease-in-out infinite}
.char-float2{animation:floatY2 4s ease-in-out infinite .6s}
.anim-fade{animation:fadeIn .5s ease forwards}
.anim-up{animation:slideUp .4s ease forwards}
.anim-inR{animation:slideInR .45s cubic-bezier(.22,1,.36,1) forwards}
.pulse{animation:pulseBright 1.8s ease-in-out infinite}

/* CINEMATIC DIALOGUE BAR */
.cinema-bar{
  position:fixed;bottom:0;left:0;right:0;
  min-height:140px;
  background:linear-gradient(to bottom,rgba(4,7,18,.0) 0%,rgba(4,7,18,.97) 12%);
  z-index:40;cursor:pointer;
  border-top:1px solid rgba(255,255,255,.06);
}
.cinema-inner{
  padding:12px 24px 14px;
  display:flex;flex-direction:column;gap:6px;
  max-width:1100px;margin:0 auto;
}
.cinema-text{
  overflow-y:auto;max-height:22vh;min-height:52px;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent;
}

/* STAR MAP */
.starmap-node{cursor:pointer;transition:all .3s}
.starmap-node:hover{filter:brightness(1.4)}

/* DASHBOARD CRT */
.crt-overlay{
  position:fixed;inset:0;pointer-events:none;z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.035) 2px,rgba(0,0,0,.035) 4px);
}
.crt-scan{
  position:fixed;inset:0;pointer-events:none;z-index:998;overflow:hidden;
}
.crt-scan::after{
  content:'';position:absolute;left:0;right:0;height:80px;
  background:linear-gradient(transparent,rgba(0,255,136,.04),transparent);
  animation:crtScan 6s linear infinite;
}
.monitor-panel{
  background:rgba(0,20,10,.7);border:1px solid rgba(0,255,136,.25);
  border-radius:8px;padding:16px;
  box-shadow:0 0 20px rgba(0,255,136,.08),inset 0 0 30px rgba(0,0,0,.5);
}
.grid-bg{
  background-image:linear-gradient(rgba(0,255,136,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.05) 1px,transparent 1px);
  background-size:40px 40px;
}
</style>

   dialogues:[
    {char:'ALPHA',text:"Planeta Orga. Our organizational systems are failing. The capsule is burning fuel because nobody knows who is responsible for what.",special:'landing',blameCircle:true},
    {char:'ORGA',text:"Greetings. I am Yudhistira, citizen of Planeta Orga. Your propulsion team suffers from what we call matrix confusion."},
    {char:'BETA',text:"Explain?"},
    {char:'ORGA',text:"Exotrail runs a functional structure overlaid with a matrix organization. Divisional and functional managers both claim ownership of the same tasks. But it goes deeper than that. Per the interview conducted with the Exotrail employee: 'Specifications were unknown by engineering teams due to a breakdown in information sharing. Technical information was not communicated to dedicated teams in an optimal way.'",special:'theoryBox',issues:['Accountability / Responsibility Problem','Unclear Goals']},
    {char:'ALPHA',text:"We saw this at ArianeGroup. An employee from Ariane told us: with 15 to 20 contributing nations on Ariane 6, information got lost traveling up the hierarchy."},
    {char:'ALPHA',text:"The employee described it precisely, per the interview conducted with the Exotrail employee: 'Planning was done in a very unclear way. No clarity was provided to the engineering team. The horizon given to engineers was 3 to 4 weeks. That is not planning, that is firefighting.'"},

    {char:'ALPHA',text:"Planeta Budgetron. Our trajectory is wrong. We budgeted for an 11-month mission with 10 crew members. We are now at month 15, with 18 people involved. That is 36% over schedule and 80% over headcount, and nobody officially acknowledged the deviation.",special:'landing'},
    {char:'BUDGETRON',text:"I am Luthfi, citizen of Planeta Budgetron. Classic overoptimism. Exotrail's initial budgets underestimate labor hours. No budget revisions mid-project. Delivery is prioritized   finances are secondary.",overoptimismChart:true},

    {char:'BUDGETRON',text:"You don't. That is the problem. Exotrail has two funding sources: fundraising and milestone-based customer contracts. A milestone is a key step in the project, marked by a formal review meeting between the customer and Exotrail. If the customer approves the milestone, Exotrail is authorized to move to the next project phase, and the customer pays the corresponding contractual portion. The entire pressure becomes: pass the milestone. Financial performance is secondary. Budget overruns become invisible until it is too late.",special:'dataPanel',milestoneBlindSpot:true},

    {char:'BUDGETRON',text:"The solution: rolling forecasts updated every six months, or at every milestone   whichever comes first. Use a WBS (Work Breakdown Structure) to track costs activity by activity. Leave a contingency buffer (ArianeGroup standard: 10 to 20 percent).",special:'theoryBox',threePartSolution:true},
    {char:'BETA',text:"Per the interview conducted with the Exotrail employee: 'The production schedule was always directed toward whichever customer was most unsatisfied that month. One month, priority for one customer. The next month, the most annoyed customer takes over. No fixed long-term production line.' This is reactive management, not planned management.",wbsDiagram:true},

    {char:'BUDGETRON',text:"Compare this with Aurelia Turbines in Finland, a company that produces one gas turbine per year. Every day, a production meeting. A very small, very clear set of defined tasks. No rushing. No reactive reprioritization. Predictable output. Predictable cost. That level of discipline is what rolling forecasts, built with engineering teams, can deliver.",aureliaCompare:true},

  {id:4,key:'riskar',title:'PLANETA RISKAR',sub:'System 4   Risk Management',bg:'riskar',

    {char:'RISKAR',text:"I am Silet, citizen of Planeta Riskar. The deadliest assumption in the space sector. Exotrail has no formal risk management process. But worse, there was an active culture of ignoring risk signals. Per the interview conducted with the Exotrail employee: 'There was a cultural push to ignore information that would not support a larger sales campaign, about the readiness of a given product or technology. Management used to ignore information.'",riskSignals:true},
    {char:'ALPHA',text:"How do you track risk on something technically this complex?"},
    {char:'RISKAR',text:"The Technology Readiness Level scale. TRL 1 through 9. TRL 1 means the concept exists on paper. TRL 9 means proven in operational space conditions. Low TRL components need more budget, more time, more contingency.",special:'dataPanel',trlDiagram:true},
    {char:'BETA',text:"Exotrail launched projects with components at TRL 4 and 5, budgeted as if they were TRL 8. Overruns were mathematically guaranteed.",special:'theoryBox'},
    {char:'ALPHA',text:"The consequences were concrete. Per the interview conducted with the Exotrail employee: 'The device manufactured for customers was underperforming or not performing at all. Exotrail was selling a technology not mastered by the company. Some critical parts were not well developed due to the rush to deliver. Supply chain problems followed as a direct consequence.'",lowTRLFlow:true},
    {char:'RISKAR',text:"There is even a name for this pattern. Richard Feynman, investigating the Challenger disaster in 1986, wrote: 'For a successful technology, reality must take precedence over public relations, for nature cannot be fooled.' The Exotrail employee quoted this exact line in the interview. Fifty years later, the same failure mode: organizational pressure suppressing technical truth.",challengerMemo:true},
    {char:'BETA',text:"And per the interview conducted with the Exotrail employee: 'The organization planned an upgrade of the manufacturing chain, while the product was not mature enough for chain manufacturing. Mass production was planned for a non-mature, non-working product.' The risk was visible to engineers. It was invisible to management, by choice.",trlMismatch:true},

    {char:'SEBASTIAN',text:"All four systems repaired. The capsule is flying. But before we land   what did we learn?"},
    {char:'ALPHA',text:"The space sector is not just an engineering challenge. It is a management accounting challenge. Exotrail, ArianeGroup, SpaceX   they all face the same question: how do you deliver complex innovation on time, within budget, under extreme uncertainty?"},

  id:i,x:Math.random()*100,y:Math.random()*100,
  sz:Math.random()*2+.4,dur:(Math.random()*3+2).toFixed(1),delay:(Math.random()*5).toFixed(1)
})):[]; // computed once outside component below

/* ═══════════════════════════════════════
   STARFIELD
═══════════════════════════════════════ */
const STAR_LIST=Array.from({length:180},(_, i)=>({
  id:i,x:Math.random()*100,y:Math.random()*100,
  sz:Math.random()*2+.4,dur:(Math.random()*3+2).toFixed(1),delay:(Math.random()*5).toFixed(1)
}));
function Starfield(){
  return(
    <div style={{position:'fixed',inset:0,zIndex:1,pointerEvents:'none',overflow:'hidden'}}>
      {STAR_LIST.map(s=>(
        <div key={s.id} style={{position:'absolute',left:`${s.x}%`,top:`${s.y}%`,
          width:s.sz,height:s.sz,background:'#E8F0FF',borderRadius:'50%',
          animation:`twinkle ${s.dur}s ease-in-out infinite ${s.delay}s`}}/>
      ))}
    </div>
  );
}

        {/* thruster flame - all repaired */}
        {repairs.every(Boolean)&&<ellipse cx="95" cy="128" rx="14" ry="8" fill="#00D4FF" opacity=".5"><animate attributeName="opacity" values=".5;1;.5" dur=".8s" repeatCount="indefinite"/></ellipse>}

        <text x="95" y="65" textAnchor="middle" fill="#00D4FF" fontSize="8" fontFamily="Orbitron" opacity=".6">EXOTRAIL-7</text>
        {/* 4 module nodes — one per corner of the satellite body */}
        {mods.map((m,i)=>{

              {isSpk&&[...Array(6)].map((_,si)=>(

const MAP_NODES={
  start:    {x:55, y:195, name:'',       sub:'',             color:'#00D4FF', r:5,  isStart:true},
  orga:     {x:190,y:105, name:'ORGA',   sub:'Organization', color:'#00FF88', r:19},
  costus:   {x:345,y:285, name:'COSTUS', sub:'Cost Control', color:'#FF8C00', r:19},
  budgetron:{x:505,y:98,  name:'BUDGETRON', sub:'Forecasting',  color:'#00BFFF', r:19},
  riskar:   {x:658,y:278, name:'RISKAR', sub:'Risk Mgmt',    color:'#FF4D4D', r:19},
  earth:    {x:848,y:178, name:'EARTH',  sub:'DESTINATION',  color:'#4FC3F7', r:34},
};
const MAP_PATH=['start','orga','costus','budgetron','riskar','earth'];

function StarMap({visitedIdx,nextKey,onLaunch}){
  const [traveling,setTraveling]=useState(false);
  const [shipPos,setShipPos]=useState(null);
  const [shipAnimating,setShipAnimating]=useState(false);
  const curKey=MAP_PATH[visitedIdx];
  const cur=MAP_NODES[curKey];
  const next=MAP_NODES[nextKey];

  const handleLaunch=()=>{
    if(traveling)return;
    setTraveling(true);
    setShipAnimating(false);
    setShipPos({x:cur.x,y:cur.y-24});
    // Two rAF cycles ensure the browser has committed the initial position before the transition fires
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      setShipAnimating(true);
      setShipPos({x:next.x,y:next.y-24});
    }));
    setTimeout(()=>{ setTraveling(false); setShipPos(null); setShipAnimating(false); onLaunch(); },2400);
  };

  const edges=[];
  for(let i=0;i<MAP_PATH.length-1;i++){
    const a=MAP_NODES[MAP_PATH[i]],b=MAP_NODES[MAP_PATH[i+1]];
    edges.push({x1:a.x,y1:a.y,x2:b.x,y2:b.y,done:i<visitedIdx});
  }

  const BG_STARS=[[95,48,2],[210,335,1.5],[392,38,2.5],[555,368,1.5],[715,55,2],[788,345,1.5],[845,42,3],[140,280,1],[460,22,1.8],[630,350,1.2]];

  return(
    <div style={{position:'fixed',inset:0,zIndex:50,overflow:'hidden'}}>
      {/* Layered deep-space backgrounds */}
      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 62% 42%, #0d1e4a 0%, #060f1e 40%, #010408 100%)'}}/>
      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 12% 68%, rgba(80,20,170,.24) 0%, transparent 48%)'}}/>
      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 88% 22%, rgba(0,70,200,.16) 0%, transparent 42%)'}}/>
      <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 50% 95%, rgba(0,30,90,.22) 0%, transparent 38%)'}}/>
      <Starfield/>
      <div style={{position:'absolute',inset:0,background:'repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.015) 3px,rgba(0,0,0,.015) 6px)',pointerEvents:'none'}}/>

      <div style={{position:'relative',zIndex:10,width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <div className="f-orb" style={{fontSize:10,color:'rgba(0,212,255,.38)',letterSpacing:6,marginBottom:4}}>NAVIGATION SYSTEM</div>
        <div className="f-orb" style={{fontSize:16,color:'#00D4FF',letterSpacing:3,marginBottom:14,textShadow:'0 0 30px #00D4FF'}}>
          EXOTRAIL ROUTE MAP
        </div>

        <div style={{width:'100%',maxWidth:980,padding:'0 12px',position:'relative'}}>
          <svg width="100%" viewBox="0 0 920 380" style={{overflow:'visible',display:'block'}}>
            <defs>
              <radialGradient id="smEarthG" cx="35%" cy="30%">
                <stop offset="0%" stopColor="#a8eeff"/><stop offset="40%" stopColor="#3aabda"/><stop offset="100%" stopColor="#093e6e"/>
              </radialGradient>
              <radialGradient id="smOrgaG" cx="32%" cy="28%">
                <stop offset="0%" stopColor="#b0ffcc"/><stop offset="100%" stopColor="#005c30"/>
              </radialGradient>
              <radialGradient id="smCostusG" cx="32%" cy="28%">
                <stop offset="0%" stopColor="#ffd090"/><stop offset="100%" stopColor="#7a3a00"/>
              </radialGradient>
              <radialGradient id="smBudgetG" cx="32%" cy="28%">
                <stop offset="0%" stopColor="#b0f0ff"/><stop offset="100%" stopColor="#005a80"/>
              </radialGradient>
              <radialGradient id="smRiskarG" cx="32%" cy="28%">
                <stop offset="0%" stopColor="#ff9980"/><stop offset="100%" stopColor="#7a0000"/>
              </radialGradient>
              <filter id="smGlow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="5" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <filter id="smEarthGlow" x="-80%" y="-80%" width="260%" height="260%">
                <feGaussianBlur stdDeviation="12" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>

            {/* ── NEBULA BACKGROUND ── */}
            <ellipse cx="460" cy="195" rx="430" ry="145" fill="rgba(28,14,72,.09)" filter="url(#smGlow)"/>
            <ellipse cx="830" cy="140" rx="170" ry="130" fill="rgba(0,55,155,.1)" filter="url(#smGlow)"/>
            <ellipse cx="190" cy="310" rx="130" ry="75" fill="rgba(55,18,110,.08)" filter="url(#smGlow)"/>
            <ellipse cx="480" cy="358" rx="410" ry="35" fill="rgba(160,140,255,.022)" filter="url(#smGlow)"/>

            {/* ── BACKGROUND STARS (extra) ── */}
            {BG_STARS.map(([x,y,r],i)=>(
              <circle key={i} cx={x} cy={y} r={r} fill="white" opacity=".55">
                <animate attributeName="opacity" values=".25;.85;.25" dur={`${2.2+i*.35}s`} begin={`${i*.3}s`} repeatCount="indefinite"/>
              </circle>
            ))}

            {/* ── PATH EDGES ── */}
            {edges.map((e,i)=>(
              <g key={i}>
                <line x1={e.x1} y1={e.y1} x2={e.x2} y2={e.y2}
                  stroke="rgba(255,255,255,.09)" strokeWidth="1.5" strokeDasharray="7 6"/>
                {e.done&&<>
                  <line x1={e.x1} y1={e.y1} x2={e.x2} y2={e.y2}
                    stroke="rgba(0,212,255,.22)" strokeWidth="7"/>
                  <line x1={e.x1} y1={e.y1} x2={e.x2} y2={e.y2}
                    stroke="#00D4FF" strokeWidth="2"
                    style={{filter:'drop-shadow(0 0 5px #00D4FF)'}}/>
                </>}
              </g>
            ))}

            {/* ── PLANETS ── */}
            {Object.entries(MAP_NODES).map(([key,node])=>{
              if(node.isStart) return null;
              const visited=MAP_PATH.slice(0,visitedIdx+1).includes(key);
              const isNext=key===nextKey;
              const isCur=key===curKey;
              const isEarth=key==='earth';
              const r=node.r;
              const gid=isEarth?'smEarthG':key==='orga'?'smOrgaG':key==='costus'?'smCostusG':key==='budgetron'?'smBudgetG':'smRiskarG';
              const active=visited||isNext||isEarth;
              return(
                <g key={key} style={{cursor:isNext?'pointer':'default'}} onClick={isNext?handleLaunch:undefined}>
                  {/* Outer atmosphere pulse */}
                  {active&&<circle cx={node.x} cy={node.y} r={r+16} fill={node.color} opacity=".05">
                    <animate attributeName="r" values={`${r+12};${r+26};${r+12}`} dur={isEarth?"4.5s":"3.2s"} repeatCount="indefinite"/>
                    <animate attributeName="opacity" values=".05;.01;.05" dur={isEarth?"4.5s":"3.2s"} repeatCount="indefinite"/>
                  </circle>}
                  {/* Halo ring */}
                  {active&&<circle cx={node.x} cy={node.y} r={r+7}
                    fill="none" stroke={node.color} strokeWidth={isEarth?1.5:1} opacity={isNext?.45:visited?.2:.12}/>}
                  {/* Next-planet alert pulse */}
                  {isNext&&<circle cx={node.x} cy={node.y} r={r+5} fill="none" stroke={node.color} strokeWidth="2.5" opacity=".7">
                    <animate attributeName="r" values={`${r+5};${r+22};${r+5}`} dur="1.5s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" values=".7;0;.7" dur="1.5s" repeatCount="indefinite"/>
                  </circle>}
                  {/* Planet sphere */}
                  <circle cx={node.x} cy={node.y} r={r}
                    fill={active?`url(#${gid})`:'rgba(255,255,255,.04)'}
                    stroke={active?node.color:'rgba(255,255,255,.15)'}
                    strokeWidth={isEarth?2.5:isNext?2:1.5}
                    filter={active?`url(#${isEarth?'smEarthGlow':'smGlow'})`:'none'}/>
                  {/* Specular highlight */}
                  {active&&<ellipse cx={node.x-r*.33} cy={node.y-r*.33} rx={r*.28} ry={r*.17}
                    fill="white" opacity=".28" transform={`rotate(-25,${node.x},${node.y})`}/>}
                  {/* Earth: continents + atmosphere ring */}
                  {isEarth&&<>
                    <ellipse cx={node.x+11} cy={node.y-8} rx={10} ry={7} fill="rgba(0,210,80,.28)"/>
                    <ellipse cx={node.x-13} cy={node.y+9} rx={8} ry={5} fill="rgba(0,210,80,.22)"/>
                    <ellipse cx={node.x-3} cy={node.y-15} rx={6} ry={4} fill="rgba(0,210,80,.18)"/>
                    <circle cx={node.x} cy={node.y} r={r+5} fill="none" stroke="#4FC3F7" strokeWidth="3" opacity=".16"/>
                  </>}
                  {/* Status tags */}
                  {visited&&!isCur&&<text x={node.x} y={node.y-r-14} textAnchor="middle" fontSize="8.5" fill="#00FF88" fontFamily="Orbitron">✓ FIXED</text>}
                  {isNext&&<text x={node.x} y={node.y-r-16} textAnchor="middle" fontSize="8" fill={node.color} fontFamily="Orbitron" style={{animation:'pulseBright .9s ease-in-out infinite'}}>► NEXT</text>}
                  {isEarth&&<text x={node.x} y={node.y-r-17} textAnchor="middle" fontSize={nextKey==='earth'?10:8} fill={node.color} fontFamily="Orbitron" opacity={nextKey==='earth'?1:.5} style={{textShadow:`0 0 14px ${node.color}`}}>DESTINATION</text>}
                  {/* Planet name */}
                  <text x={node.x} y={node.y+r+15} textAnchor="middle" fontSize={isEarth?11:8.5}
                    fill={node.color} fontFamily="Orbitron" opacity={active?.92:.25}>{node.name}</text>
                  <text x={node.x} y={node.y+r+26} textAnchor="middle" fontSize="6.5"
                    fill="rgba(255,255,255,.38)">{node.sub}</text>
                </g>
              );
            })}

            {/* ── SHIP ── */}
            {shipPos?(
              <g style={{
                transform:`translate(${shipPos.x}px,${shipPos.y}px)`,
                transition:shipAnimating?'transform 2.2s cubic-bezier(.4,0,.2,1)':'none',
              }}>
                <text textAnchor="middle" fontSize="24"
                  style={{filter:'drop-shadow(0 0 14px #00D4FF) drop-shadow(0 0 6px white)'}}>🛸</text>
              </g>
            ):(
              <text x={cur.x} y={cur.y-24} textAnchor="middle" fontSize="24"
                style={{filter:'drop-shadow(0 0 10px #00D4FF)',animation:'floatY 2.5s ease-in-out infinite'}}>🛸</text>
            )}
          </svg>
        </div>

        {/* Launch button */}
        <div style={{textAlign:'center',marginTop:12}}>
          <button onClick={handleLaunch} disabled={traveling} className="f-orb"
            style={{fontSize:13,padding:'11px 34px',borderRadius:8,
              border:`2px solid ${next?.color||'#00D4FF'}`,
              color:next?.color||'#00D4FF',
              background:`${next?.color||'#00D4FF'}14`,
              cursor:traveling?'default':'pointer',letterSpacing:2,
              boxShadow:`0 0 26px ${next?.color||'#00D4FF'}28`,
              opacity:traveling?.45:1,transition:'all .3s'}}>
            {traveling?'LAUNCHING...':'🚀 LAUNCH TO '+(next?.name||nextKey.toUpperCase())}
          </button>
        </div>
      </div>
    </div>
  );
}

function IssueOverlay({issues}){

    {border:'rgba(255,60,60,.75)',glow:'rgba(255,60,60,.35)',text:'#FF4D4D',icon:'⚠️',bg:'rgba(30,0,0,.92)'},
    {border:'rgba(255,140,0,.7)', glow:'rgba(255,140,0,.28)',text:'#FF8C00',icon:'🔴',bg:'rgba(25,8,0,.92)'},

  return(
    <div style={{
      position:'fixed',top:70,left:0,right:0,bottom:160,
      zIndex:25,pointerEvents:'none',
      display:'flex',alignItems:'center',justifyContent:'center',

            <div style={{
              position:'absolute',top:0,left:0,right:0,bottom:0,
              background:`repeating-linear-gradient(0deg,transparent,transparent 3px,${p.border.replace('.75','.04').replace('.7','.04')} 3px,${p.border.replace('.75','.04').replace('.7','.04')} 4px)`,
              pointerEvents:'none',borderRadius:16,

              animation:'pulseBright 2s ease-in-out infinite',

      })}
    </div>
  );
}

/* ═══════════════════════════════════════
   BLAME CIRCLE (Orga / Rami)
═══════════════════════════════════════ */
function BlameCircle(){
  const N=5;
  const R=108; // circle radius (person positions)
  const cx=200, cy=200; // SVG center
  const labels=['Finance','Ops','Eng.','Sales','PM'];
  const personColor='rgba(180,200,230,.92)';
  // compute person positions
  const people=Array.from({length:N},(_,i)=>{
    const a=(i/N)*Math.PI*2 - Math.PI/2;
    return {x:cx+R*Math.cos(a), y:cy+R*Math.sin(a), a};
  });
  return(
    <div style={{position:'fixed',top:70,left:0,right:0,bottom:160,zIndex:25,
      pointerEvents:'none',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div className="anim-up" style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>

        {/* SVG scene */}
        <svg viewBox="0 0 400 400" width="340" height="340" style={{overflow:'visible'}}>
          <defs>
            <radialGradient id="fireGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stopColor="#FFE066" stopOpacity="1"/>
              <stop offset="40%" stopColor="#FF6600" stopOpacity="0.9"/>
              <stop offset="100%" stopColor="#FF0000" stopOpacity="0"/>
            </radialGradient>
            <filter id="glow2"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <filter id="softglow"><feGaussianBlur stdDeviation="8"/></filter>
          </defs>

          {/* Glow halo under fire */}
          <circle cx={cx} cy={cy} r="52" fill="rgba(255,120,0,.18)">
            <animate attributeName="r" values="48;58;48" dur="1.2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.18;0.32;0.18" dur="1.2s" repeatCount="indefinite"/>
          </circle>

          {/* ── BURNING CASH PILE ── */}
          {/* Bills */}
          {[[-14,-6,'-8deg'],[ 8,-4, '5deg'],[-4, 8,'-3deg']].map(([dx,dy,rot],i)=>(
            <g key={i} transform={`translate(${cx+dx},${cy+dy}) rotate(${rot})`}>
              <rect x="-16" y="-8" width="32" height="16" rx="2"
                fill={i===0?'rgba(60,120,60,.85)':i===1?'rgba(50,110,50,.75)':'rgba(70,130,60,.7)'}
                stroke="rgba(0,80,0,.5)" strokeWidth="0.7"/>
              <line x1="-10" y1="0" x2="10" y2="0" stroke="rgba(0,60,0,.5)" strokeWidth="0.8"/>
              <circle cx="0" cy="0" r="4" fill="rgba(0,60,0,.3)" stroke="rgba(0,60,0,.4)" strokeWidth="0.6"/>
            </g>
          ))}
          {/* Main flame — 3 animated layers */}
          {[
            {rx:18,ry:28,fill:'#FF3300',dur:'0.18s',oy:-4},
            {rx:13,ry:22,fill:'#FF8800',dur:'0.14s',oy:-6},
            {rx:7, ry:14,fill:'#FFDD44',dur:'0.10s',oy:-9},
          ].map((f,i)=>(
            <ellipse key={i} cx={cx} cy={cy+f.oy} rx={f.rx} ry={f.ry} fill={f.fill} opacity="0.92">
              <animate attributeName="rx" values={`${f.rx};${f.rx+5};${f.rx-3};${f.rx+4};${f.rx}`} dur={f.dur} repeatCount="indefinite"/>
              <animate attributeName="ry" values={`${f.ry};${f.ry-4};${f.ry+3};${f.ry-2};${f.ry}`} dur={f.dur} repeatCount="indefinite"/>
              <animate attributeName="opacity" values="0.92;1;0.75;0.95;0.92" dur={f.dur} repeatCount="indefinite"/>
            </ellipse>
          ))}
          {/* Sparks */}
          {[0,1,2,3,4,5].map(i=>{
            const sa=(i/6)*Math.PI*2;
            const tx=cx+Math.cos(sa)*28, ty=cy+Math.sin(sa)*28;
            return <circle key={i} cx={cx} cy={cy} r="1.8" fill={i%2===0?'#FFD700':'#FF8800'}>
              <animate attributeName="cx" values={`${cx};${tx};${tx+Math.cos(sa)*10}`} dur={`${0.6+i*0.1}s`} begin={`${i*0.1}s`} repeatCount="indefinite"/>
              <animate attributeName="cy" values={`${cy};${ty-15};${ty-30}`} dur={`${0.6+i*0.1}s`} begin={`${i*0.1}s`} repeatCount="indefinite"/>
              <animate attributeName="opacity" values="0;1;0" dur={`${0.6+i*0.1}s`} begin={`${i*0.1}s`} repeatCount="indefinite"/>
              <animate attributeName="r" values="1.8;2.4;0" dur={`${0.6+i*0.1}s`} begin={`${i*0.1}s`} repeatCount="indefinite"/>
            </circle>;
          })}

          {/* ── PEOPLE ── */}
          {people.map((p,i)=>{
            // pointing arms: toward previous person (left) and next person (right)
            const prev=people[(i+N-1)%N];
            const next=people[(i+1)%N];
            // arm end points: halfway toward each neighbour
            const alx=p.x+(prev.x-p.x)*0.52, aly=p.y+(prev.y-p.y)*0.52;
            const arx=p.x+(next.x-p.x)*0.52, ary=p.y+(next.y-p.y)*0.52;
            // shrug / gaze toward fire (center)
            const toFireA=Math.atan2(cy-p.y, cx-p.x);
            const eyeOX=Math.cos(toFireA)*3.5, eyeOY=Math.sin(toFireA)*3.5;
            return(
              <g key={i}>
                {/* body */}
                <line x1={p.x} y1={p.y+10} x2={p.x} y2={p.y+30}
                  stroke={personColor} strokeWidth="2.5" strokeLinecap="round"/>
                {/* legs */}
                <line x1={p.x} y1={p.y+30} x2={p.x-7} y2={p.y+46}
                  stroke={personColor} strokeWidth="2" strokeLinecap="round"/>
                <line x1={p.x} y1={p.y+30} x2={p.x+7} y2={p.y+46}
                  stroke={personColor} strokeWidth="2" strokeLinecap="round"/>
                {/* left arm → pointing toward prev person */}
                <line x1={p.x} y1={p.y+16} x2={alx} y2={aly}
                  stroke="#FF9966" strokeWidth="2.2" strokeLinecap="round"/>
                {/* arrowhead left */}
                <circle cx={alx} cy={aly} r="3" fill="#FF7744"/>
                {/* right arm → pointing toward next person */}
                <line x1={p.x} y1={p.y+16} x2={arx} y2={ary}
                  stroke="#FF9966" strokeWidth="2.2" strokeLinecap="round"/>
                {/* arrowhead right */}
                <circle cx={arx} cy={ary} r="3" fill="#FF7744"/>
                {/* head */}
                <circle cx={p.x} cy={p.y} r="10" fill="rgba(20,40,80,.9)" stroke={personColor} strokeWidth="1.4"/>
                {/* eyes looking toward fire */}
                <circle cx={p.x+eyeOX*0.5} cy={p.y+eyeOY*0.5} r="1.8" fill={personColor}/>
                <circle cx={p.x+eyeOX*0.5+eyeOX*0.3} cy={p.y+eyeOY*0.5+eyeOY*0.3} r="1" fill="rgba(0,0,0,.5)"/>
                {/* role label */}
                {(()=>{
                  const lx=p.x+(p.x-cx)*0.38, ly=p.y+(p.y-cy)*0.38+4;
                  return <text x={lx} y={ly} textAnchor="middle"
                    fontFamily="monospace" fontSize="9.5" fill="rgba(150,190,240,.75)"
                    fontWeight="bold">{labels[i]}</text>;
                })()}
              </g>
            );
          })}

          {/* "?" bubbles above each person */}
          {people.map((p,i)=>(
            <text key={i} x={p.x+(p.x-cx)*0.18} y={p.y-18}
              textAnchor="middle" fontFamily="monospace" fontSize="13"
              fill="rgba(255,220,80,.85)">
              ?
              <animate attributeName="opacity" values="0.3;1;0.3" dur={`${1.4+i*0.22}s`} begin={`${i*0.28}s`} repeatCount="indefinite"/>
              <animate attributeName="y" values={`${p.y-18};${p.y-24};${p.y-18}`} dur={`${1.4+i*0.22}s`} begin={`${i*0.28}s`} repeatCount="indefinite"/>
            </text>
          ))}
        </svg>

        {/* Caption */}
        <div style={{fontFamily:'monospace',fontSize:9,letterSpacing:1.5,
          color:'rgba(255,160,100,.75)',textAlign:'center',textTransform:'uppercase',
          textShadow:'0 0 12px rgba(255,100,0,.4)'}}>
          Everyone points. Nobody acts. Cash burns.
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   REPAIR ANIMATION
═══════════════════════════════════════ */
function RepairAnim({repair,onDone}){
  const [phase,setPhase]=useState(0); // 0=damaged 1=repairing 2=restored 3=departing
  useEffect(()=>{
    const ts=[
      setTimeout(()=>setPhase(1), 900),
      setTimeout(()=>setPhase(2), 3300),
      setTimeout(()=>setPhase(3), 5300),
      setTimeout(()=>onDone(),   6900),
    ];
    return()=>ts.forEach(clearTimeout);
  },[]);
  const advance=()=>{
    if(phase===2){setPhase(3);setTimeout(onDone,1600);}
    else if(phase===3){onDone();}
  };
  const col=repair?.color||'#00CFFF';
  const sys=(repair?.sys||'SYSTEM').toUpperCase();
  const sc=phase===0?'#FF3333':phase===1?'#FF9900':phase===2?'#00EE88':'#00CFFF';
  // phase colours for left panel (damaged side)
  const lpStr=phase===0?'#FF3322':phase===1?'#FF8800':col;
  const lpFill=phase===0?'rgba(60,8,4,.9)':phase===1?'rgba(50,28,4,.9)':'rgba(4,26,12,.9)';

  return(
    <div onClick={advance} style={{
      position:'fixed',inset:0,zIndex:60,overflow:'hidden',
      cursor:phase>=2?'pointer':'default',
      background:'radial-gradient(ellipse 160% 160% at 50% 50%, rgba(0,10,30,.98) 0%, rgba(1,2,12,1) 100%)',
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:20,
    }}>

      {/* ── STARFIELD ── */}
      <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}
        viewBox="0 0 900 580" preserveAspectRatio="xMidYMid slice">
        <defs>
          <filter id="rf-blur"><feGaussianBlur stdDeviation="22"/></filter>
        </defs>
        {/* nebula glows */}
        <ellipse cx="160" cy="130" rx="240" ry="140" fill={`${col}08`} filter="url(#rf-blur)"/>
        <ellipse cx="740" cy="450" rx="260" ry="150" fill="rgba(110,50,200,.055)" filter="url(#rf-blur)"/>
        {/* stars */}
        {Array.from({length:88},(_,i)=>{
          const cx=(i*113.7+i*i*0.41)%900, cy=(i*97.1+i*i*0.27)%580;
          const r=i%9===0?1.9:i%4===0?1.15:0.62;
          const dur=2.4+(i%7)*0.42; const del=(i*0.37)%4.8;
          const lo=0.07+(i%3)*0.06, hi=0.38+(i%5)*0.16;
          return <circle key={i} cx={cx} cy={cy} r={r} fill="white">
            <animate attributeName="opacity" values={`${lo};${hi};${lo}`} dur={`${dur}s`} begin={`${del}s`} repeatCount="indefinite"/>
          </circle>;
        })}
      </svg>

      {/* ── SATELLITE ── */}
      <div style={{
        position:'relative',
        transform:phase===3?'translateX(115vw) scale(0.22) rotate(-4deg)':'translateX(0) scale(1) rotate(0deg)',
        transition:phase===3?'transform 1.55s cubic-bezier(.5,0,1,.55)':'none',
      }}>
        <svg viewBox="0 0 400 190" width="540" height="257" style={{
          overflow:'visible',
          filter:phase===0?'drop-shadow(0 0 18px rgba(255,50,20,.55))':
                 phase===1?'drop-shadow(0 0 20px rgba(255,140,0,.52))':
                 `drop-shadow(0 0 32px ${col}99)`,
          transition:'filter 1s ease',
        }}>

          {/* LEFT SOLAR PANEL */}
          <rect x="5" y="76" width="95" height="38" rx="3" fill={lpFill} stroke={lpStr} strokeWidth="1.6"/>
          {[26,47,68,89].map(x=><line key={x} x1={x} y1="76" x2={x} y2="114" stroke={lpStr} strokeWidth="0.55" opacity="0.38"/>)}
          <line x1="5" y1="95" x2="100" y2="95" stroke={lpStr} strokeWidth="0.55" opacity="0.38"/>
          {/* solar cell fill when healthy */}
          {phase>=2&&[0,1,2,3].map(i=>[

            <rect key={`lb${i}`} x={5+i*21} y="95" width="20" height="18" rx="1" fill={`rgba(0,210,90,.13)`}/>,

            <circle key={i} cx={bx} cy={by} r="2.6" fill={phase>=2?col:'#245080'} opacity="0.7"/>

/* ═══════════════════════════════════════
   CINEMATIC DIALOGUE BAR
═══════════════════════════════════════ */
function CinemaBar({chapter,dIdx,onNext,onBack,canGoBack,onTogglePanel,onToggleTheory,onToggleRaci}){
  const dlg=chapter.dialogues[dIdx];
  const [text,setText]=useState('');
  const [typing,setTyping]=useState(false);
  const timer=useRef(null);

  useEffect(()=>{
    if(!dlg)return;
    setText('');setTyping(true);
    let i=0;const s=dlg.text;
    timer.current=setInterval(()=>{
      i++;setText(s.slice(0,i));
      if(i>=s.length){setTyping(false);clearInterval(timer.current);}
    },15);
    return()=>clearInterval(timer.current);
  },[dIdx,chapter.id]);

  const handleClick=()=>{
    if(typing){clearInterval(timer.current);setText(dlg.text);setTyping(false);}
    else onNext();
  };

  if(!dlg)return null;
  const c=CHARS[dlg.char];
  const isLast=dIdx>=chapter.dialogues.length-1;

  return(
    <div className="cinema-bar" onClick={handleClick}>
      <div className="cinema-inner">
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
          <span className="f-orb" style={{fontSize:12,color:c.color,letterSpacing:1}}>{c.name}</span>
          <span style={{fontSize:10,color:'rgba(255,255,255,.3)',fontStyle:'italic'}}>{c.role}</span>
          <div style={{flex:1}}/>
          {chapter.dataPanel&&<button onClick={e=>{e.stopPropagation();onTogglePanel();}} className="f-mono" style={{fontSize:10,padding:'3px 9px',border:'1px solid rgba(0,212,255,.35)',borderRadius:5,color:'#00D4FF',background:'rgba(0,212,255,.08)',cursor:'pointer'}}>📊 Data</button>}
          {chapter.theoryBox&&<button onClick={e=>{e.stopPropagation();onToggleTheory();}} className="f-mono" style={{fontSize:10,padding:'3px 9px',border:'1px solid rgba(123,47,255,.35)',borderRadius:5,color:'#7B2FFF',background:'rgba(123,47,255,.08)',cursor:'pointer'}}>📖 Theory</button>}
          {dlg?.special==='raciCompare'&&<button onClick={e=>{e.stopPropagation();onToggleRaci();}} className="f-mono" style={{fontSize:10,padding:'3px 9px',border:'1px solid rgba(0,255,136,.35)',borderRadius:5,color:'#00FF88',background:'rgba(0,255,136,.08)',cursor:'pointer'}}>🏛️ RACI</button>}
        </div>
        <div className="cinema-text" style={{borderLeft:`3px solid ${c.color}`,paddingLeft:12}}>
          <p style={{fontSize:15,lineHeight:1.65,color:'rgba(232,240,255,.94)'}}>
            {text}{typing&&<span style={{color:c.color,animation:'pulseBright .5s ease-in-out infinite'}}>▋</span>}
          </p>
          {!typing&&dlg.text.toLowerCase().includes('per the interview conducted with the exotrail employee')&&(
            <p style={{fontSize:11,fontStyle:'italic',color:'#00D4FF',opacity:.75,marginTop:5}}>
              - Interview with Exotrail employee, Chief Fluid System Engineer
            </p>
          )}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {canGoBack&&(
              <button onClick={e=>{e.stopPropagation();onBack();}} className="f-mono"
                style={{fontSize:10,color:c.color,opacity:.75,background:'none',border:'none',cursor:'pointer',padding:0}}>
                ◀ Go Back
              </button>
            )}
            <div style={{display:'flex',gap:6}}>
              {chapter.dialogues.map((_,i)=>(
                <div key={i} style={{height:3,borderRadius:1.5,width:i===dIdx?18:5,
                  background:i<dIdx?'#00FF88':i===dIdx?c.color:'rgba(255,255,255,.15)',transition:'all .3s'}}/>
              ))}
            </div>
          </div>
          {typing
            ?<span className="f-mono" style={{fontSize:10,color:'rgba(255,255,255,.2)'}}>click to skip ▶</span>
            :<span className="f-mono pulse" style={{fontSize:10,color:c.color}}>
              {isLast?(chapter.repair?'⚙️ ACTIVATE REPAIR ▶▶':'🚀 CONTINUE ▶▶'):'click to continue ▶'}
            </span>}
        </div>
      </div>
    </div>
  );
}

function ForecastChart(){
  const W=340,H=150,pL=38,pB=26,pT=10,pR=12;
  const cW=W-pL-pR,cH=H-pB-pT;
  const tx=m=>pL+(m/24)*cW, ty=v=>H-pB-(v/22)*cH;
  const budget=Array.from({length:25},(_,m)=>m*.5);
  const actual=Array.from({length:25},(_,m)=>m<=14?m*.56:7.84+(m-14)*1.05);
  const forecast=Array.from({length:25},(_,m)=>m<6?m*.5:m<12?m*.58+.15:m<18?m*.68+.6:m*.74+.9);
  const pts=d=>d.map((v,i)=>`${tx(i).toFixed(1)},${ty(v).toFixed(1)}`).join(' ');
  return(
    <div className="monitor-panel">
      <div className="f-orb" style={{fontSize:11,color:'#00FF88',letterSpacing:2,marginBottom:10}}>ROLLING FORECAST vs BUDGET</div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}>
        {[0,5,10,15,20].map(v=><line key={v} x1={pL} y1={ty(v)} x2={W-pR} y2={ty(v)} stroke="rgba(0,255,136,.08)" strokeWidth=".8"/>)}
        {[0,10,20].map(v=><text key={v} x={pL-4} y={ty(v)+3} textAnchor="end" fill="rgba(0,255,136,.4)" fontSize="7" fontFamily="Space Mono">€{v}M</text>)}
        {[0,6,12,18,24].map(m=><text key={m} x={tx(m)} y={H-7} textAnchor="middle" fill="rgba(0,255,136,.4)" fontSize="7" fontFamily="Space Mono">M{m}</text>)}
        <polyline points={pts(budget)} fill="none" stroke="#00BFFF" strokeWidth="1.5" strokeDasharray="5 3"/>
        <polyline points={pts(actual)} fill="none" stroke="#FF4D4D" strokeWidth="2"/>
        <polyline points={pts(forecast)} fill="none" stroke="#00FF88" strokeWidth="1.5" strokeDasharray="8 4"/>
        <line x1={tx(14)} y1={pT} x2={tx(14)} y2={ty(actual[14])} stroke="#FF4D4D" strokeWidth="1" strokeDasharray="2 2"/>
        <text x={tx(14)+4} y={pT+12} fill="#FF4D4D" fontSize="7" fontFamily="Space Mono">⚠️ M14 overrun</text>
      </svg>
      <div style={{display:'flex',gap:12,marginTop:6}}>
        {[['#00BFFF','Budget'],['#FF4D4D','Actual'],['#00FF88','Forecast']].map(([c,l])=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:14,height:2,background:c}}/>
            <span className="f-mono" style={{fontSize:9,color:'rgba(0,255,136,.5)'}}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function App(){

  const [dIdx,setDIdx]=useState(0);
  const [phase,setPhase]=useState('scene'); // 'scene'|'starmap'|'dashboard'

  const [showLowTRL,setShowLowTRL]=useState(false);
  const [showTRLMismatch,setShowTRLMismatch]=useState(false);
  const [showRiskRegister,setShowRiskRegister]=useState(false);
  const [showSpacePattern,setShowSpacePattern]=useState(false);
  const [showRiskFramework,setShowRiskFramework]=useState(false);
  const [showOveroptimismChart,setShowOveroptimismChart]=useState(false);
  const [showMilestoneBlindSpot,setShowMilestoneBlindSpot]=useState(false);
  const [showThreePartSolution,setShowThreePartSolution]=useState(false);
  const [showWBSDiagram,setShowWBSDiagram]=useState(false);
  const [showEngineeringDisconnect,setShowEngineeringDisconnect]=useState(false);
  const [showAureliaCompare,setShowAureliaCompare]=useState(false);
  const [showFourSolutions,setShowFourSolutions]=useState(false);
  const [showBlameCircle,setShowBlameCircle]=useState(false);
  const [showExotrail,setShowExotrail]=useState(false);
  const [showSector,setShowSector]=useState(false);
  const [repairs,setRepairs]=useState([false,false,false,false]);
  const [alarm,setAlarm]=useState(false);
  const POWER_LEVELS=[10,32,55,80,100];
  const power=POWER_LEVELS[repairs.filter(Boolean).length];

  const ch=CHAPTERS[chIdx];
  const dlg=ch.dialogues[dIdx];
  const isLast=dIdx>=ch.dialogues.length-1;

  useEffect(()=>{
    if(dlg?.special==='alarm'){setAlarm(true);const t=setTimeout(()=>setAlarm(false),2200);return()=>clearTimeout(t);}
  },[dIdx,chIdx]);
  useEffect(()=>{
    if(dlg?.special==='dataPanel')setShowPanel(true);
    if(dlg?.special==='theoryBox')setShowTheory(true);
    if(dlg?.special==='raciCompare'){setShowRaci(true);setActiveIssues(null);}
    if(dlg?.issues)setActiveIssues(dlg.issues);
    setShowCostProblems(!!dlg?.costProblems);
    if(dlg?.costDashboard)setShowCostDashboard(true);
    setShowMoneyBurn(!!dlg?.moneyBurn);
    setShowNoCostingAlert(!!dlg?.noCostingAlert);
    setShowRiskSignals(!!dlg?.riskSignals);
    setShowTRLDiagram(!!dlg?.trlDiagram);
    setShowChallenger(!!dlg?.challengerMemo);
    setShowLowTRL(!!dlg?.lowTRLFlow);
    setShowTRLMismatch(!!dlg?.trlMismatch);
    setShowRiskRegister(!!dlg?.riskRegister);
    setShowSpacePattern(!!dlg?.spacePattern);
    setShowRiskFramework(!!dlg?.riskFramework);
    setShowOveroptimismChart(!!dlg?.overoptimismChart);
    setShowMilestoneBlindSpot(!!dlg?.milestoneBlindSpot);
    setShowThreePartSolution(!!dlg?.threePartSolution);
    setShowWBSDiagram(!!dlg?.wbsDiagram);
    setShowEngineeringDisconnect(!!dlg?.engineeringDisconnect);
    setShowAureliaCompare(!!dlg?.aureliaCompare);
    setShowFourSolutions(!!dlg?.fourSolutions);
    setShowBlameCircle(!!dlg?.blameCircle);
  },[dIdx,chIdx]);

  const goTo=useCallback((i)=>{
    setChIdx(i);setDIdx(0);setShowPanel(false);setShowTheory(false);setShowRepair(false);setShowRaci(false);setActiveIssues(null);setShowCostProblems(false);setShowCostDashboard(false);setShowMoneyBurn(false);setShowNoCostingAlert(false);setShowRiskSignals(false);setShowTRLDiagram(false);setShowChallenger(false);setShowLowTRL(false);setShowTRLMismatch(false);setShowRiskRegister(false);setShowSpacePattern(false);setShowRiskFramework(false);setShowOveroptimismChart(false);setShowMilestoneBlindSpot(false);setShowThreePartSolution(false);setShowWBSDiagram(false);setShowEngineeringDisconnect(false);setShowAureliaCompare(false);setShowFourSolutions(false);setShowBlameCircle(false);
    setPhase(i===6?'dashboard':'scene');
  },[]);

  const handleNext=useCallback(()=>{
    if(!dlg)return;
    if(dlg.special==='repair'){
      const pi=chIdx-1;
      if(pi<0||pi>3||!repairs[pi])setShowRepair(true);
      else setDIdx(i=>i+1);
      return;
    }
    if(isLast){
      if(STARMAP_AFTER.includes(chIdx)){
        setPhase('starmap');
      } else if(chIdx<CHAPTERS.length-1){
        goTo(chIdx+1);
      }
    } else {
      setDIdx(i=>i+1);
    }
  },[dlg,isLast,chIdx,goTo,repairs]);

  const handleBack=useCallback(()=>{
    if(dIdx>0){
      setDIdx(i=>i-1);
    } else if(chIdx>0){
      const prevCh=CHAPTERS[chIdx-1];
      setChIdx(chIdx-1);
      setDIdx(prevCh.dialogues.length-1);
      setPhase('scene');
      setShowPanel(false);setShowTheory(false);setShowRaci(false);setActiveIssues(null);setShowCostProblems(false);setShowCostDashboard(false);setShowMoneyBurn(false);setShowNoCostingAlert(false);setShowRiskSignals(false);setShowTRLDiagram(false);setShowChallenger(false);setShowLowTRL(false);setShowTRLMismatch(false);setShowRiskRegister(false);setShowSpacePattern(false);setShowRiskFramework(false);setShowOveroptimismChart(false);setShowMilestoneBlindSpot(false);setShowThreePartSolution(false);setShowWBSDiagram(false);setShowEngineeringDisconnect(false);setShowAureliaCompare(false);setShowFourSolutions(false);setShowBlameCircle(false);
    }
  },[dIdx,chIdx]);
  const canGoBack=!(chIdx===0&&dIdx===0);

  const handleRepairDone=useCallback(()=>{
    setShowRepair(false);
    const pi=chIdx-1;
    if(pi>=0&&pi<4)setRepairs(r=>{const n=[...r];n[pi]=true;return n;});
    if(dIdx>=CHAPTERS[chIdx].dialogues.length-1){
      if(STARMAP_AFTER.includes(chIdx)){setPhase('starmap');}
      else{goTo(chIdx+1);}
    }else{setDIdx(i=>i+1);}
  },[chIdx,dIdx,goTo]);

  const handleLaunch=useCallback(()=>{
    goTo(chIdx+1);
  },[chIdx,goTo]);

  // Which characters to show in scene
  const leftChar=useMemo(()=>{
    if(!dlg)return null;
    if(['SEBASTIAN'].includes(dlg.char))return null;
    return ['ALPHA','BETA'].includes(dlg.char)?dlg.char:
      ch.dialogues.find(d=>['ALPHA','BETA'].includes(d.char))?.char||null;
  },[dlg,ch]);
  const rightChar=useMemo(()=>{
    if(!dlg)return null;
    if(['ALPHA','BETA','SEBASTIAN'].includes(dlg.char))return null;
    return dlg.char;
  },[dlg]);
  const centerChar=useMemo(()=>{
    if(!dlg)return null;
    return dlg.char==='SEBASTIAN'?'SEBASTIAN':null;
  },[dlg]);

  const isDash=phase==='dashboard';
  const isMap=phase==='starmap';

  return(
    <div style={{position:'fixed',inset:0,overflow:'hidden',background:'#060912'}}>
      {alarm&&<div style={{position:'fixed',inset:0,zIndex:56,pointerEvents:'none',animation:'redFlash .35s ease-in-out 5'}}/>}
      {power===10&&!isDash&&<div style={{position:'fixed',inset:0,zIndex:57,pointerEvents:'none',boxShadow:'inset 0 0 70px rgba(255,77,77,.22)',animation:'pulseBright 2s ease-in-out infinite'}}/>}
      <Starfield/>
      {!isDash&&!isMap&&<SceneBg chapter={ch}/>}
      {isDash&&<Dashboard/>}
      {isMap&&<StarMap visitedIdx={chIdx} nextKey={NEXT_DEST[chIdx]} onLaunch={handleLaunch}/>}
      {!isDash&&<NavBar chIdx={chIdx} onGlossary={()=>setShowGloss(true)} onExotrail={()=>setShowExotrail(s=>!s)} onSector={()=>setShowSector(s=>!s)} onDevSkip={()=>goTo(chIdx+1)}/>}
      {!isDash&&!isMap&&<SpacecraftView repairs={repairs}/>}
      {!isDash&&!isMap&&<PowerBar power={power}/>}

      {/* SCENE CHARACTERS */}
      {!isDash&&!isMap&&(
        <div style={{position:'fixed',inset:0,zIndex:10,pointerEvents:'none',display:'flex',alignItems:'flex-end',justifyContent:'space-between',paddingBottom:165,paddingLeft:24,paddingRight:24}}>
          {/* Left character */}
          <div className="char-float" style={{opacity:dlg&&['ALPHA','BETA'].includes(dlg.char)?1:.55,transition:'opacity .5s',transform:dlg&&['ALPHA','BETA'].includes(dlg.char)?'scale(1.04)':'scale(1)',transformOrigin:'bottom center'}}>
            {leftChar&&<CharSprite charKey={leftChar} h={window.innerHeight*.42}/>}
          </div>
          {/* Center (Sebastian) */}
          {centerChar&&(
            <div className="char-float2" style={{position:'absolute',left:'50%',transform:'translateX(-50%)',bottom:160,opacity:1,zIndex:12}}>
              <CharSprite charKey="SEBASTIAN" h={window.innerHeight*.44}/>
            </div>
          )}
          {/* Right character */}
          <div className="char-float2" style={{opacity:dlg&&!['ALPHA','BETA','SEBASTIAN'].includes(dlg.char)?1:.55,transition:'opacity .5s',transform:dlg&&!['ALPHA','BETA','SEBASTIAN'].includes(dlg.char)?'scale(1.04)':'scale(1)',transformOrigin:'bottom center'}}>
            {rightChar&&<CharSprite charKey={rightChar} h={window.innerHeight*.42}/>}
          </div>
        </div>
      )}

      {/* Issue overlay (scene only) */}
      {!isDash&&!isMap&&<IssueOverlay issues={activeIssues}/>}

      {/* Planet header (scene only) */}
      {!isDash&&!isMap&&ch.planet&&(
        <div className="anim-fade" style={{position:'fixed',top:70,left:'50%',transform:'translateX(-50%)',zIndex:30,textAlign:'center'}}>
          <div className="f-orb" style={{fontSize:15,color:ch.planet.color,border:`1px solid ${ch.planet.color}50`,borderRadius:30,padding:'4px 20px',boxShadow:`0 0 20px ${ch.planet.color}30`,textShadow:`0 0 12px ${ch.planet.color}`}}>
            {ch.planet.emoji} {ch.planet.name}
          </div>
        </div>
      )}

      {/* Cinematic dialogue bar */}
      {!isDash&&!isMap&&ch.dialogues.length>0&&(
        <CinemaBar chapter={ch} dIdx={dIdx} onNext={handleNext} onBack={handleBack} canGoBack={canGoBack} onTogglePanel={()=>setShowPanel(s=>!s)} onToggleTheory={()=>setShowTheory(s=>!s)} onToggleRaci={()=>setShowRaci(s=>!s)}/>
      )}

      {/* Earth chapter   chapter advance button when no repair */}
      {!isDash&&!isMap&&ch.dialogues.length>0&&chIdx===5&&isLast&&(
        <div style={{position:'fixed',bottom:165,left:'50%',transform:'translateX(-50%)',zIndex:42}}>
          <button onClick={()=>goTo(6)} className="f-orb" style={{fontSize:13,padding:'10px 32px',borderRadius:8,border:'2px solid #FFD700',color:'#FFD700',background:'rgba(255,215,0,.1)',cursor:'pointer',letterSpacing:2,boxShadow:'0 0 20px rgba(255,215,0,.3)'}}>
            📊 VIEW MAC DASHBOARD
          </button>
        </div>
      )}

      {/* Overlays */}
      {showPanel&&ch.dataPanel&&<DataPanel panel={ch.dataPanel} onClose={()=>setShowPanel(false)}/>}
      {showTheory&&ch.theoryBox&&<TheoryModal box={ch.theoryBox} onClose={()=>setShowTheory(false)}/>}
      {showRepair&&ch.repair&&<RepairAnim repair={ch.repair} onDone={handleRepairDone}/>}
      {showGloss&&<GlossModal onClose={()=>setShowGloss(false)}/>}
      {showExotrail&&<DataPanel panel={EXOTRAIL_PANEL} onClose={()=>setShowExotrail(false)}/>}
      {showSector&&<DataPanel panel={SECTOR_PANEL} onClose={()=>setShowSector(false)}/>}
      {showRaci&&<RACICompare onClose={()=>setShowRaci(false)}/>}
      {!isDash&&!isMap&&showRiskFramework&&<RiskFramework/>}
      {!isDash&&!isMap&&showOveroptimismChart&&<OveroptimismChart/>}
      {!isDash&&!isMap&&showMilestoneBlindSpot&&<MilestoneBlindSpot/>}
      {!isDash&&!isMap&&showThreePartSolution&&<ThreePartSolution/>}
      {!isDash&&!isMap&&showWBSDiagram&&<WBSDiagram/>}
      {!isDash&&!isMap&&showEngineeringDisconnect&&<EngineeringDisconnect/>}
      {!isDash&&!isMap&&showAureliaCompare&&<AureliaCompare/>}
      {!isDash&&!isMap&&showFourSolutions&&<FourSolutionsPanel/>}
      {!isDash&&!isMap&&showBlameCircle&&<BlameCircle/>}
      {!isDash&&!isMap&&showSpacePattern&&<SpacePatternWarning/>}
      {!isDash&&!isMap&&showRiskRegister&&<RiskRegister/>}
      {!isDash&&!isMap&&showTRLMismatch&&<TRLMismatch/>}
      {!isDash&&!isMap&&showLowTRL&&<LowTRLFlow/>}
      {!isDash&&!isMap&&showChallenger&&<ChallengerMemo/>}
      {!isDash&&!isMap&&showTRLDiagram&&<TRLDiagram/>}
      {!isDash&&!isMap&&showRiskSignals&&<IgnoredRiskSignals/>}
      {!isDash&&!isMap&&showMoneyBurn&&<MoneyBurnScene/>}
      {!isDash&&!isMap&&showNoCostingAlert&&<NoCostingAlert/>}
      {!isDash&&!isMap&&showCostProblems&&<CostProblemCards/>}
      {showCostDashboard&&<CostingDashboard onClose={()=>setShowCostDashboard(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
